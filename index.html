<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ระบบลงเวลา 2PS SERVICE</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
<style>
@import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap');
*{box-sizing:border-box;}
body{font-family:'Sarabun',sans-serif;background:#f1f5f9;margin:0;}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.sidebar-item.active{background:#374151;border-left:4px solid #3b82f6;color:#fff;}
.sidebar-item{border-left:4px solid transparent;}
.badge-green{background:#dcfce7;color:#166534;}
.badge-red{background:#fee2e2;color:#991b1b;}
.badge-yellow{background:#fef9c3;color:#854d0e;}
.badge-blue{background:#dbeafe;color:#1e40af;}
.badge-purple{background:#f3e8ff;color:#6b21a8;}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:9999;align-items:center;justify-content:center;}
.modal-overlay.active{display:flex;}
.screen{display:none;}
.screen.active{display:flex;}
#login-screen{min-height:100vh;background:linear-gradient(135deg,#0f172a 0%,#1e3a5f 50%,#0f172a 100%);align-items:center;justify-content:center;}
.scan-line{position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,transparent,#22d3ee,transparent);animation:scanAnim 2s linear infinite;}
@keyframes scanAnim{0%{top:0}100%{top:100%}}
tr:nth-child(even){background:#f8fafc;}

/* ===== MOBILE BOTTOM NAV ===== */
#app-screen.mobile-mode{flex-direction:column;}
#app-screen.mobile-mode #sidebar{display:none;}
#app-screen.mobile-mode #mobile-header{display:flex;}
#app-screen.mobile-mode #mobile-bottom-nav{display:flex;}
#app-screen.mobile-mode main{flex:1;overflow:hidden;display:flex;flex-direction:column;}
#mobile-header{display:none;height:56px;background:#1f2937;align-items:center;justify-content:space-between;padding:0 16px;flex-shrink:0;z-index:100;}
#mobile-bottom-nav{display:none;position:fixed;bottom:0;left:0;right:0;background:#1f2937;border-top:1px solid #374151;z-index:999;padding-bottom:env(safe-area-inset-bottom);}
.mob-nav-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:8px 4px;color:#9ca3af;cursor:pointer;border:none;background:transparent;font-family:Sarabun,sans-serif;gap:3px;min-height:56px;transition:color .2s;}
.mob-nav-item.active{color:#3b82f6;}
.mob-nav-item.active .mob-icon{color:#3b82f6;}
.mob-nav-item .mob-icon{font-size:18px;line-height:1;}
.mob-nav-item .mob-label{font-size:10px;line-height:1;white-space:nowrap;}
.mob-nav-item.sup-accent.active{color:#a78bfa;}
.mob-nav-item.emp-accent.active{color:#34d399;}
#app-screen.mobile-mode #main-content{padding-bottom:72px;}

.loading-spinner{display:inline-block;width:18px;height:18px;border:2px solid #e5e7eb;border-top-color:#3b82f6;border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
#page-loader{position:fixed;inset:0;background:rgba(255,255,255,.85);z-index:8888;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;}
#page-loader.hidden{display:none;}

/* ===== FACE RECOGNITION ===== */
#face-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:10000;align-items:center;justify-content:center;}
#face-modal.active{display:flex;}
.face-ring{position:absolute;border:3px solid #22d3ee;border-radius:50%;pointer-events:none;transition:border-color .25s,box-shadow .25s;}
@keyframes faceRingPulse{0%,100%{opacity:.7;transform:scale(1)}50%{opacity:1;transform:scale(1.015)}}
.face-ring-pulse{animation:faceRingPulse 1.2s ease-in-out infinite;}
/* Green radar scan line — sweeps top→bottom→top */
@keyframes radarScan{
  0%  {top:0%;opacity:1}
  45% {top:96%;opacity:.9}
  50% {top:96%;opacity:0}
  55% {top:0%;opacity:0}
  60% {top:0%;opacity:1}
  100%{top:0%;opacity:1}
}
@keyframes radarScanRev{
  0%  {top:96%;opacity:1}
  45% {top:0%;opacity:.9}
  50% {top:0%;opacity:0}
  55% {top:96%;opacity:0}
  60% {top:96%;opacity:1}
  100%{top:96%;opacity:1}
}
#face-radar-line{position:absolute;left:0;right:0;height:3px;background:linear-gradient(90deg,transparent 0%,#22c55e 20%,#4ade80 50%,#22c55e 80%,transparent 100%);filter:drop-shadow(0 0 6px #22c55e);pointer-events:none;animation:radarScan 2s linear infinite;}
#face-radar-glow{position:absolute;left:0;right:0;height:40px;background:linear-gradient(180deg,rgba(34,197,94,.18) 0%,transparent 100%);pointer-events:none;animation:radarScan 2s linear infinite;margin-top:-2px;}
.face-ring.green{box-shadow:0 0 0 3px rgba(34,197,94,.3),0 0 24px rgba(34,197,94,.4);}
.face-ring.red{box-shadow:0 0 0 3px rgba(239,68,68,.3),0 0 24px rgba(239,68,68,.4);}
.face-ring.yellow{box-shadow:0 0 0 3px rgba(245,158,11,.3),0 0 16px rgba(245,158,11,.3);}
.face-status-box{margin-top:14px;padding:12px 16px;border-radius:14px;text-align:center;font-size:13px;font-weight:600;transition:all .3s;}
</style>
</head>

<script>
// =====================================================================
//  FIREBASE REST API  (ไม่ใช้ SDK — ใช้ fetch ตรงกับ RTDB REST endpoint)
//  ไม่มี dependency ภายนอก โหลดเร็ว ทำงานได้ทันที
// =====================================================================
const FB = 'https://moneyperday-75225-default-rtdb.asia-southeast1.firebasedatabase.app';
const FB_KEY = 'AIzaSyBl6zeaeYiPHa0arLNBHJewLg8oSzb66Bs';

async function fbGet(path) {
  const r = await fetch(`${FB}${path}.json?auth=${FB_KEY}`);
  if (!r.ok) throw new Error(`GET ${path} → HTTP ${r.status}`);
  return r.json(); // null หรือ object
}

async function fbSet(path, data) {
  const r = await fetch(`${FB}${path}.json?auth=${FB_KEY}`, {
    method: 'PUT',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(data)
  });
  if (!r.ok) throw new Error(`SET ${path} → HTTP ${r.status}`);
  return r.json();
}

async function fbPush(path, data) {
  const r = await fetch(`${FB}${path}.json?auth=${FB_KEY}`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(data)
  });
  if (!r.ok) throw new Error(`PUSH ${path} → HTTP ${r.status}`);
  return r.json(); // { name: "-Nxxx" }
}

async function fbPatch(path, data) {
  const r = await fetch(`${FB}${path}.json?auth=${FB_KEY}`, {
    method: 'PATCH',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(data)
  });
  if (!r.ok) throw new Error(`PATCH ${path} → HTTP ${r.status}`);
  return r.json();
}

async function fbDelete(path) {
  const r = await fetch(`${FB}${path}.json?auth=${FB_KEY}`, { method: 'DELETE' });
  if (!r.ok) throw new Error(`DELETE ${path} → HTTP ${r.status}`);
  return null;
}

// โหลด attendance ทั้งเดือน ด้วย orderBy + startAt/endAt query
async function fbGetMonth(ym) {
  const start = encodeURIComponent(`"${ym}-01"`);
  const end   = encodeURIComponent(`"${ym}-31"`);
  const url   = `${FB}/attendance.json?auth=${FB_KEY}&orderBy=%22%24key%22&startAt=${start}&endAt=${end}`;
  const r = await fetch(url);
  if (!r.ok) throw new Error(`GET /attendance month ${ym} → HTTP ${r.status}`);
  return r.json();
}

// =====================================================================
//  IN-MEMORY CACHE  (loaded from Firebase on startup)
// =====================================================================
let db = {
  admin: { username: 'admin888', password: 'admin888' },
  supervisors: [],
  employees: [],
  departments: [],
  attendance: {},   // { 'YYYY-MM-DD': { firebaseKey: record } }
  wage: { defaultWage: 400, otRate: 75, workStart: '07:00', workEnd: '17:00' }
};

// =====================================================================
//  INIT — load all data from Firebase then show login
// =====================================================================
async function initApp() {
  showLoader('กำลังโหลดข้อมูลจาก Firebase...');
  try {
    // ทดสอบการเชื่อมต่อก่อน
    const ping = await fetch(`${FB}/settings/admin.json?auth=${FB_KEY}`, { signal: AbortSignal.timeout(10000) });
    if (ping.status === 401 || ping.status === 403) {
      showLoaderError('🔒 Firebase Rules ปิดการเข้าถึง', 'กรุณาตั้ง Rules เป็น ".read": true, ".write": true ในคอนโซล Firebase แล้วรีเฟรชหน้า');
      return;
    }
    if (!ping.ok && ping.status !== 200) {
      showLoaderError('❌ เชื่อมต่อ Firebase ไม่ได้ (HTTP ' + ping.status + ')', 'กรุณาตรวจสอบ Firebase Rules และ databaseURL');
      return;
    }

    const [supervisors, employees, departments, wage, admin] = await Promise.all([
      fbGet('/supervisors'),
      fbGet('/employees'),
      fbGet('/departments'),
      fbGet('/settings/wage'),
      fbGet('/settings/admin')
    ]);

    db.supervisors = supervisors && typeof supervisors === 'object'
      ? Object.entries(supervisors).map(([k, v]) => ({ _key: k, ...v })) : [];
    db.employees = employees && typeof employees === 'object'
      ? Object.entries(employees).map(([k, v]) => ({ _key: k, ...v })) : [];
    db.departments = departments && typeof departments === 'object'
      ? Object.entries(departments).map(([k, v]) => ({ _key: k, ...v })) : [];
    if (wage) db.wage = { ...db.wage, ...wage };
    if (admin) db.admin = { ...db.admin, ...admin };

    // Load check-in mode
    const ciMode = await fbGet('/settings/checkinMode');
    if (ciMode) checkinMode = ciMode;

    // Load area-specific check-in methods
    const areaMethods = await fbGet('/settings/areaCheckinMethods');
    if (areaMethods && typeof areaMethods === 'object') areaCheckinMethods = areaMethods;

    // Load device bindings
    const devData = await fbGet('/deviceBindings');
    if (devData && typeof devData === 'object') deviceBindings = devData;

    // Load GPS locations (new multi-location format)
    const gpsData = await fbGet('/settings/gpsLocations');
    if (gpsData && typeof gpsData === 'object') {
      gpsLocations = Object.entries(gpsData).map(([k,v]) => ({ id:k, ...v }));
    }
    // Fallback: migrate old single-location setting
    if (!gpsLocations.length) {
      const oldGps = await fbGet('/settings/gps');
      if (oldGps && oldGps.lat) {
        const migrated = { name:'สถานที่หลัก', lat:oldGps.lat, lng:oldGps.lng, radius:oldGps.radius||100 };
        const res = await fbPush('/settings/gpsLocations', migrated);
        gpsLocations = [{ id: res.name, ...migrated }];
        hrGPS = migrated;
      }
    } else {
      hrGPS = gpsLocations[0]; // legacy compat
    }
    faceMatcherDirty = true; // will rebuild on first scan

    if (db.departments.length === 0) {
      showLoader('🌱 ตั้งค่าข้อมูลเริ่มต้น...');
      await seedInitialData();
    }

    hideLoader();
    document.getElementById('login-screen').classList.add('active');
    document.getElementById('login-u').focus();
  } catch (e) {
    const isTimeout = e.name === 'TimeoutError' || e.name === 'AbortError';
    const msg = isTimeout ? 'หมดเวลาเชื่อมต่อ (10 วินาที)' : e.message;
    showLoaderError('❌ เชื่อมต่อ Firebase ไม่ได้', msg);
    console.error('initApp error:', e);
  }
}

function showLoaderError(title, detail) {
  const el = document.getElementById('page-loader');
  el.classList.remove('hidden');
  el.innerHTML = `
    <div style="text-align:center;max-width:400px;padding:0 20px;">
      <div style="font-size:48px;margin-bottom:12px;">⚠️</div>
      <div style="font-size:18px;font-weight:700;color:#1e293b;margin-bottom:8px;">${title}</div>
      <div style="font-size:13px;color:#64748b;margin-bottom:20px;line-height:1.6;">${detail}</div>
      <div style="background:#f1f5f9;border-radius:8px;padding:12px;font-size:12px;color:#475569;text-align:left;margin-bottom:20px;font-family:monospace;">
        Firebase Rules ที่ต้องตั้ง:<br>
        { "rules": { ".read": true, ".write": true } }
      </div>
      <button onclick="location.reload()" style="background:#3b82f6;color:white;border:none;padding:12px 32px;border-radius:8px;font-size:15px;font-weight:700;cursor:pointer;font-family:Sarabun,sans-serif;">
        🔄 ลองใหม่อีกครั้ง
      </button>
    </div>`;
}

async function seedInitialData() {
  // Seed departments
  const depts = ['งานเรือ', 'งานล้าง Yard', 'งานคลังสินค้า', 'งานธุรการ/ออฟฟิศ'];
  for (const name of depts) {
    const res = await fbPush('/departments', { name });
    db.departments.push({ _key: res.name, name });
  }
  // Seed admin settings
  await fbSet('/settings/admin', { username: 'admin888', password: 'admin888' });
  await fbSet('/settings/wage', db.wage);
}

// =====================================================================
//  ATTENDANCE — load a specific date from Firebase
// =====================================================================
async function loadAttendanceDate(dateKey) {
  showSync();
  try {
    const data = await fbGet(`/attendance/${dateKey}`);
    db.attendance[dateKey] = data && typeof data === 'object' ? data : {};
  } catch (e) {
    db.attendance[dateKey] = {};
    console.error('loadAttendanceDate', e);
  }
  hideSync();
  return db.attendance[dateKey];
}

// Get attendance records for a date as array
function getAttendanceArray(dateKey) {
  const bucket = db.attendance[dateKey] || {};
  return Object.values(bucket);
}

// Load attendance for a whole month via REST orderBy query
async function loadAttendanceMonth(ym) {
  showSync();
  try {
    const data = await fbGetMonth(ym);
    if (data && typeof data === 'object') {
      Object.entries(data).forEach(([dk, bucket]) => {
        if (dk.startsWith(ym)) {
          db.attendance[dk] = (bucket && typeof bucket === 'object') ? bucket : {};
        }
      });
    }
  } catch(e) { console.error('loadAttendanceMonth', e); }
  hideSync();
}


// =====================================================================
//  AUTH
// =====================================================================
const todayStr = (()=>{const d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');})();
let CU = null;
let qrTimer = null, qrExp = null, camStream = null, camScanning = false;
let hrGPS = { lat: 13.756331, lng: 100.501827, radius: 100 }; // legacy single-loc fallback
let gpsLocations = []; // array of {id,name,lat,lng,radius}
window._activeToken = null;

// ===== DEVICE BINDING & AREA METHOD GLOBALS =====
let areaCheckinMethods = {};  // { locationId: 'qr'|'face'|'both'|'gps_button' }
let deviceBindings = {};      // { empId: { deviceId, boundAt, boundByName } }

function getDeviceId() {
  let did = localStorage.getItem('2ps_device_id');
  if (!did) {
    did = 'DEV_' + Date.now().toString(36).toUpperCase() + '_' + Math.random().toString(36).substr(2,8).toUpperCase();
    localStorage.setItem('2ps_device_id', did);
  }
  return did;
}
function checkDeviceBinding(empId) {
  const b = deviceBindings[empId];
  const did = getDeviceId();
  if (!b || !b.deviceId) return { bound: false, match: false };
  // ตรวจ conflict — device นี้ผูกกับคนอื่นอยู่ไหม
  const allPeople = [
    ...db.employees.map(e => ({ id: e._key, name: e.name, role: 'พนักงาน' })),
    ...db.supervisors.map(s => ({ id: s._key, name: s.name, role: 'หัวหน้างาน' }))
  ];
  const conflict = allPeople.find(p => p.id !== empId && deviceBindings[p.id]?.deviceId === did);
  if (conflict) return { bound: true, match: false, conflict: true, conflictName: conflict.name, conflictRole: conflict.role };
  return { bound: true, match: b.deviceId === did };
}
// =====================================================================
//  ตรวจสอบการมาสาย — คืน { late:bool, minutesLate:number, workStart:string }
// =====================================================================
function checkLate(emp, checkInTime) {
  if (!checkInTime) return { late: false, minutesLate: 0, workStart: '' };
  // หา workStart ของสายงานนั้น
  const ds = db.wage.deptSettings || {};
  const cfg = ds[emp.dept || emp] || {};
  const workStart = (cfg.useCustomTime && cfg.workStart) ? cfg.workStart : (db.wage.workStart || '08:00');
  // แปลงเป็นนาที
  const toMin = t => { const [h,m]=(t||'00:00').split(':').map(Number); return h*60+m; };
  const startMin = toMin(workStart);
  const inMin    = toMin(checkInTime);
  const diff     = inMin - startMin;
  return { late: diff > 0, minutesLate: Math.max(0, diff), workStart };
}

// =====================================================================
//  อัตรา OT ที่มีผล — lookup จาก deptSettings หรือ emp.otRate รายบุคคล
// =====================================================================
function getEffectiveOTRate(emp) {
  const ds = db.wage.deptSettings || {};
  const cfg = ds[emp.dept];
  if (!cfg) {
    // ไม่มีตั้งค่าสาย → ใช้ emp.otRate ถ้ามี หรือค่า default
    return emp.otRate || db.wage.otRate || 75;
  }
  if (cfg.mode === 'individual') {
    // รายบุคคล → ใช้ emp.otRate ของแต่ละคนโดยตรง
    return emp.otRate || cfg.otRate || db.wage.otRate || 75;
  }
  // 'job' → ใช้ otRate ของสาย
  return cfg.otRate || emp.otRate || db.wage.otRate || 75;
}

// =====================================================================
//  ค่าแรงที่มีผล — คำนวณตาม deptSettings ของแต่ละสายงาน
// =====================================================================
function getEffectiveWage(emp) {
  const ds = db.wage.deptSettings || {};
  const cfg = ds[emp.dept];
  if (!cfg) {
    // ไม่มีการตั้งค่า → ใช้ค่าพื้นฐาน
    return db.wage.defaultWage;
  }
  if (cfg.mode === 'individual') {
    // รายบุคคล → ใช้จากข้อมูลพนักงาน ถ้าไม่มีใช้ค่าพื้นฐาน
    return emp.wage || db.wage.defaultWage;
  }
  // 'job' → ใช้ jobRate ของสายนั้น ถ้าไม่มีใช้ค่าพื้นฐาน
  return cfg.jobRate || db.wage.defaultWage;
}

function getEffectiveCheckinMode(empObj) {
  // ถ้ามีการตั้งค่าวิธีเช็คชื่อรายพื้นที่ → ใช้ค่าแรกที่ตั้งไว้
  // (เพราะไม่รู้พนักงานอยู่พื้นที่ไหนก่อนเช็ค GPS จริง — ใช้ค่าพื้นที่แรกเป็น default)
  // Admin สามารถตั้งค่า Global fallback ได้ที่หน้า Area Methods
  // หากทุกพื้นที่ตั้งค่าเหมือนกัน (เช่น gps_button) จะใช้ค่านั้น
  const vals = Object.values(areaCheckinMethods);
  if (vals.length > 0) {
    // ถ้าทุก zone ตั้งค่าเหมือนกัน → ใช้ค่านั้น
    const unique = [...new Set(vals)];
    if (unique.length === 1) return unique[0];
    // ถ้า zone แรกที่ตั้งค่า gps_button ให้ priority
    if (vals.some(v => v === 'gps_button')) return 'gps_button';
    return vals[0];
  }
  return checkinMode;
}

async function doLogin() {
  const u = document.getElementById('login-u').value.trim();
  const p = document.getElementById('login-p').value;
  const err = document.getElementById('login-err');
  const btn = document.getElementById('login-btn');
  err.classList.add('hidden');
  btn.innerHTML = '<div class="loading-spinner mx-auto"></div>';
  btn.disabled = true;

  try {
    // Reload latest credentials from Firebase
    const [adminData, supsData, empsData] = await Promise.all([
      fbGet('/settings/admin'),
      fbGet('/supervisors'),
      fbGet('/employees')
    ]);
    if (adminData) db.admin = adminData;
    if (supsData) db.supervisors = Object.entries(supsData).map(([k,v])=>({_key:k,...v}));
    if (empsData) db.employees = Object.entries(empsData).map(([k,v])=>({_key:k,...v}));

    if (u === db.admin.username && p === db.admin.password) {
      CU = { username: u, role: 'admin', displayName: 'Admin', id: 'admin', color: '#3b82f6' };
    } else {
      const sup = db.supervisors.find(s => s.username === u && s.password === p);
      if (sup) CU = { username: u, role: 'supervisor', displayName: sup.name, id: sup._key, supId: sup.id, color: '#7c3aed' };
      else {
        const emp = db.employees.find(e => e.username === u && e.password === p);
        if (emp) CU = { username: u, role: 'employee', displayName: emp.name, id: emp._key, empId: emp.id, color: '#059669' };
      }
    }

    if (!CU) {
      err.textContent = 'ชื่อผู้ใช้หรือรหัสผ่านไม่ถูกต้อง';
      err.classList.remove('hidden');
    } else {
      // GPS locations already loaded in initApp; refresh on login just in case
      if (!gpsLocations.length) {
        const gpsData = await fbGet('/settings/gpsLocations');
        if (gpsData) gpsLocations = Object.entries(gpsData).map(([k,v])=>({id:k,...v}));
        if (gpsLocations.length) hrGPS = gpsLocations[0];
      }
      faceMatcherDirty = true;
      await loadAttendanceDate(todayStr);
      startApp();
    }
  } catch(e) {
    err.textContent = 'เชื่อมต่อ Firebase ไม่ได้: ' + e.message;
    err.classList.remove('hidden');
  }
  btn.innerHTML = '<i class="fas fa-sign-in-alt mr-2"></i>เข้าสู่ระบบ';
  btn.disabled = false;
}

      ${mkStatCard('มาสาย',supLateCount+' คน','fa-clock','red',supLateCount>0?`showDashModal('sup-late','${dateKey}')`:'')}
      ${mkStatCard('ขาด/ยังไม่มา',supAbsent+' คน','fa-user-times','yellow',supAbsent>0?`showDashModal('sup-absent','${dateKey}')`:'')}
    </div>
    ${supLateCount>0?`<div style="margin-top:10px;display:flex;flex-wrap:wrap;gap:6px;align-items:center;">
      <span style="font-size:12px;font-weight:700;color:#7c3aed;"><i class="fas fa-exclamation-triangle mr-1"></i>มาสาย:</span>
      ${supRecords.filter(r=>{const s=db.supervisors.find(x=>x._key===r.empId)||{};return checkLate({dept:s.dept},r.checkInTime).late;})
        .map(r=>{const s=db.supervisors.find(x=>x._key===r.empId)||{};const lt=checkLate({dept:s.dept},r.checkInTime);
          return`<span style="background:#fff;border:1px solid #d8b4fe;border-radius:20px;padding:3px 10px;font-size:12px;color:#7c3aed;">
            <strong>${r.empName}</strong> <span style="color:#9333ea;">+${lt.minutesLate}น.</span></span>`;}).join('')}
    </div>`:''}
  </div>

  <!-- === พนักงาน === -->
  <div style="font-size:12px;font-weight:700;color:#2563eb;margin-bottom:10px;display:flex;align-items:center;gap:6px;">
    <i class="fas fa-users"></i> พนักงาน
  </div>
  <div class="grid grid-cols-2 lg:grid-cols-4 gap-4 mb-4">
    ${mkStatCard('พนักงานทั้งหมด',totalEmp+' คน','fa-users','blue',`showDashModal('all','${dateKey}')`)}
    ${mkStatCard('มาทำงาน',present+' คน','fa-user-check','green',`showDashModal('present','${dateKey}')`)}
    ${mkStatCard('มาสาย',lateCount+' คน','fa-clock','red',lateCount>0?`showDashModal('late','${dateKey}')`:'')}
    ${mkStatCard('ขาด/ยังไม่มา',absent+' คน','fa-user-times','yellow',`showDashModal('absent','${dateKey}')`)}
  </div>
  ${lateCount>0?`<div style="background:#fef2f2;border:1px solid #fecaca;border-radius:12px;padding:12px 16px;margin-bottom:16px;">
    <div style="font-size:13px;font-weight:700;color:#991b1b;margin-bottom:8px;"><i class="fas fa-exclamation-triangle mr-2"></i>รายชื่อมาสายวันนี้ (${lateCount} คน)</div>
    <div style="display:flex;flex-wrap:wrap;gap:6px;">
      ${records.filter(r=>{const emp=db.employees.find(e=>e._key===r.empId)||{dept:r.dept};return checkLate(emp,r.checkInTime).late;})
        .map(r=>{const emp=db.employees.find(e=>e._key===r.empId)||{dept:r.dept};const lt=checkLate(emp,r.checkInTime);
          return`<span style="background:#fff;border:1px solid #fca5a5;border-radius:20px;padding:4px 10px;font-size:12px;color:#991b1b;">
            <strong>${r.empName}</strong> <span style="color:#dc2626;">+${lt.minutesLate}น.</span>
            <span style="color:#94a3b8;font-size:11px;">${r.dept}</span></span>`;}).join('')}
    </div>
  </div>`:''}`;

  // ---- การ์ดสายงาน (คลิกได้) ----
  html+=`<div class="grid grid-cols-2 lg:grid-cols-4 gap-4 mb-6">`;
  db.departments.forEach(d=>{
    const dr=records.filter(r=>r.dept===d.name);
    const total=db.employees.filter(e=>e.dept===d.name).length;
    const absentD=total-dr.length;
    const dEnc=encodeURIComponent(d.name);
    html+=`<div class="bg-white rounded-xl shadow-sm p-4 border-t-4 border-blue-300 cursor-pointer hover:shadow-md hover:scale-[1.02] transition-all"
      onclick="showDashModal('dept','${dateKey}','${dEnc}')">
      <div class="font-bold text-gray-700 text-sm mb-2">${d.name}</div>
      <div class="flex justify-between text-sm">
        <span class="text-green-600 font-bold"><i class="fas fa-user-check mr-1"></i>${dr.length}</span>
        <span class="${absentD>0?'text-red-500 font-bold':'text-gray-400'}"><i class="fas fa-user-times mr-1"></i>${absentD}</span>
        <span class="text-gray-300 text-xs">/${total}</span>
      </div>
      <div class="text-xs text-gray-400 mt-2">คลิกดูรายชื่อ →</div>
    </div>`;
  });
  html+=`</div>`;

  // ---- ตารางเข้างานวันนี้ + ปุ่ม Export Excel ----
  html+=card(`
    <div class="flex justify-between items-center mb-3 flex-wrap gap-2">
      <div class="font-bold text-gray-700">
        บันทึกเข้างาน
        <span class="text-sm font-normal text-gray-400 ml-1">(${records.length} คน)</span>
        <button onclick="renderDashBody('${dateKey}')" class="ml-3 text-xs text-blue-500 hover:underline">
          <i class="fas fa-sync mr-1"></i>รีเฟรช
        </button>
      </div>
      <div class="flex gap-2 flex-wrap">
        ${CU.role==='admin'?`<button onclick="adminCheckInFor('${dateKey}')"
          class="flex items-center gap-2 bg-blue-600 hover:bg-blue-700 text-white px-3 py-2 rounded-lg text-sm font-medium transition shadow-sm">
          <i class="fas fa-user-check"></i> เช็คชื่อให้พนักงาน
        </button>`:''}
        <button onclick="exportDashExcel('${dateKey}')"
          class="flex items-center gap-2 bg-green-600 hover:bg-green-700 text-white px-4 py-2 rounded-lg text-sm font-medium transition shadow-sm">
          <i class="fas fa-file-excel"></i> Export Excel
        </button>
      </div>
    </div>
    <div class="overflow-x-auto">
      <table class="min-w-full text-sm">
        ${THead('เวลาเข้า','เวลาออก','ชื่อพนักงาน','สายงาน','หัวหน้า','OT','ค่าแรง','ค่า OT','รวม','GPS','วิธี',...(CU.role==='admin'?['จัดการ']:[]))}
        <tbody>${records.length===0?EmptyR(CU.role==='admin'?12:11):records.map(r=>`<tr class="hover:bg-blue-50">
          <td class="px-4 py-2 font-mono text-sm">${r.checkInTime}</td>
          <td class="px-4 py-2 font-mono text-sm ${r.checkOutTime?'text-red-600':'text-gray-300'}">${r.checkOutTime||'—'}</td>
          <td class="px-4 py-2 font-medium">${r.empName}</td>
          <td class="px-4 py-2 text-gray-500">${r.dept}</td>
          <td class="px-4 py-2 text-gray-500">${r.sup}</td>
          <td class="px-4 py-2 text-center">${r.otHours>0?bdg('yellow',r.otHours+'ชม.'):'-'}</td>
          <td class="px-4 py-2 text-right">฿${r.wage.toLocaleString()}</td>
          <td class="px-4 py-2 text-right">฿${r.otPay.toLocaleString()}</td>
          <td class="px-4 py-2 text-right font-bold text-blue-700">฿${r.total.toLocaleString()}</td>
          <td class="px-4 py-2">${r.gpsOk?bdg('green','✓ตรงจุด'):bdg('red','✗นอก')}</td>
          <td class="px-4 py-2">${r.checkInMethod==='face'?bdg('purple','😊ใบหน้า'):bdg('blue','QR')}</td>
          ${CU.role==='admin'?`<td class="px-4 py-2 whitespace-nowrap">
            <button onclick="adminEditAttendance('${dateKey}',${JSON.stringify(r).replace(/"/g,'&quot;')})" class="text-blue-600 text-xs hover:underline mr-2"><i class="fas fa-edit"></i> แก้ไข</button>
          </td>`:''}
        </tr>`).join('')}</tbody>
        ${records.length>0?`<tfoot class="bg-gray-50 font-bold"><tr>
          <td colspan="5" class="px-4 py-2 text-right text-sm text-gray-600">รวม</td>
          <td class="px-4 py-2 text-center text-sm">${records.reduce((s,r)=>s+r.otHours,0).toFixed(1)}</td>
          <td class="px-4 py-2 text-right text-sm">฿${records.reduce((s,r)=>s+r.wage,0).toLocaleString()}</td>
          <td class="px-4 py-2 text-right text-sm">฿${records.reduce((s,r)=>s+r.otPay,0).toLocaleString()}</td>
          <td class="px-4 py-2 text-right text-sm text-blue-700">฿${tWage.toLocaleString()}</td>
          <td></td><td></td>${CU.role==='admin'?'<td></td>':''}
        </tr></tfoot>`:''}
      </table>

  const el=document.getElementById('dash-body');
  if(el)el.innerHTML=html;
}

// ---- Modal แสดงรายชื่อเมื่อคลิกการ์ด ----
window.showDashModal=function(type, dateKey, deptEnc){
  const dept=deptEnc?decodeURIComponent(deptEnc):'';
  const records=getAttendanceArray(dateKey);
  const presentIds=new Set(records.map(r=>r.empId));
  const supRecords = records.filter(r => db.supervisors.some(s => s._key === r.empId));

  let title='', rows=[], cols=[];

  // ---- Supervisor modals ----
  if(type==='sup-all'){
    title=`หัวหน้างานทั้งหมด (${db.supervisors.length} คน)`;
    cols=['ชื่อ-นามสกุล','สายงาน','สถานะ'];
    rows=db.supervisors.map(s=>{
      const rec=supRecords.find(r=>r.empId===s._key);
      return[s.name, s.dept||'-',
        rec?`<span class="badge-green px-2 py-0.5 rounded text-xs">✓ ${rec.checkInTime}</span>`
           :`<span class="badge-red px-2 py-0.5 rounded text-xs">ยังไม่มา</span>`];
    });
  } else if(type==='sup-present'){
    title=`หัวหน้างานมาทำงาน (${supRecords.length} คน)`;
    cols=['ชื่อ-นามสกุล','สายงาน','เวลาเข้า','เวลาออก','ค่าแรง','GPS'];
    rows=supRecords.map(r=>[r.empName, r.dept||'-',
      `<span class="font-mono bg-gray-100 px-2 py-0.5 rounded text-xs">${r.checkInTime}</span>`,
      r.checkOutTime?`<span class="font-mono bg-gray-100 px-2 py-0.5 rounded text-xs">${r.checkOutTime}</span>`:`<span class="text-gray-400 text-xs">ยังไม่ออก</span>`,
      `<span class="font-medium text-green-700">฿${(r.total||0).toLocaleString()}</span>`,
      r.gpsOk?'<span class="badge-green px-2 py-0.5 rounded text-xs">✓ GPS</span>':'<span class="badge-red px-2 py-0.5 rounded text-xs">✗</span>'
    ]);
  } else if(type==='sup-late'){
    const lateRecs=supRecords.filter(r=>{const s=db.supervisors.find(x=>x._key===r.empId)||{};return checkLate({dept:s.dept},r.checkInTime).late;});
    title=`หัวหน้างานมาสาย (${lateRecs.length} คน)`;
    cols=['ชื่อ-นามสกุล','สายงาน','เวลาเข้า','เวลาออก','ค่าแรง'];
    rows=lateRecs.map(r=>{
      const s=db.supervisors.find(x=>x._key===r.empId)||{};
      const lt=checkLate({dept:s.dept},r.checkInTime);
      return[`${r.empName} <span style="color:#ef4444;font-size:11px;font-weight:700;">+${lt.minutesLate}น.</span>`,
        r.dept||'-',
        `<span class="font-mono text-xs text-red-600">${r.checkInTime}</span>`,
        r.checkOutTime?`<span class="font-mono bg-gray-100 px-2 py-0.5 rounded text-xs">${r.checkOutTime}</span>`:`<span class="text-gray-400 text-xs">ยังไม่ออก</span>`,
        `<span class="font-medium text-green-700">฿${(r.total||0).toLocaleString()}</span>`
      ];
    });
  } else if(type==='sup-absent'){
    const supPresentIds=new Set(supRecords.map(r=>r.empId));
    const absentSups=db.supervisors.filter(s=>!supPresentIds.has(s._key));
    title=`หัวหน้างานขาด/ยังไม่มา (${absentSups.length} คน)`;
    cols=['ชื่อ-นามสกุล','สายงาน','เบอร์โทร'];
    rows=absentSups.map(s=>[s.name, s.dept||'-', s.phone||'-']);
  } else if(type==='all'){
    title=`พนักงานทั้งหมด (${db.employees.length} คน)`;
    cols=['ชื่อ-นามสกุล','สายงาน','หัวหน้า','สถานะ'];
    rows=db.employees.map(e=>{
      const rec=records.find(r=>r.empId===e._key);
      return[e.name, e.dept||'-', e.sup||'-',
        rec?`<span class="badge-green px-2 py-0.5 rounded text-xs">✓ ${rec.checkInTime}</span>`
           :`<span class="badge-red px-2 py-0.5 rounded text-xs">ยังไม่มา</span>`];
    });
  } else if(type==='present'){
    title=`มาทำงานวันนี้ (${records.length} คน)`;
    cols=['ชื่อ-นามสกุล','สายงาน','หัวหน้า','เวลาเข้า','เวลาออก','ค่าแรง','GPS'];
    rows=records.map(r=>[r.empName, r.dept, r.sup,
      `<span class="font-mono bg-gray-100 px-2 py-0.5 rounded text-xs">${r.checkInTime}</span>`,
      r.checkOutTime
        ? `<span class="font-mono bg-gray-100 px-2 py-0.5 rounded text-xs">${r.checkOutTime}</span>`
        : `<span class="text-gray-400 text-xs">ยังไม่ออก</span>`,
      `<span class="font-medium text-green-700">฿${r.total.toLocaleString()}</span>`,
      r.gpsOk?'<span class="badge-green px-2 py-0.5 rounded text-xs">✓ GPS</span>'
              :'<span class="badge-red px-2 py-0.5 rounded text-xs">✗ นอกพื้นที่</span>'
    ]);
  } else if(type==='late'){
    const lateRows = records.filter(r => {
      const emp = db.employees.find(e=>e._key===r.empId) || {dept:r.dept};
      return checkLate(emp, r.checkInTime).late;
    });
    title=`มาสายวันนี้ (${lateRows.length} คน)`;
    cols=['ชื่อ-นามสกุล','สายงาน','หัวหน้า','เวลาเข้า','เวลาออก','ค่าแรง'];
    rows=lateRows.map(r=>{
      const emp = db.employees.find(e=>e._key===r.empId)||{dept:r.dept};
      const lt = checkLate(emp, r.checkInTime);
      return [
        `${r.empName} <span style="color:#ef4444;font-size:11px;font-weight:700;">+${lt.minutesLate}น.</span>`,
        r.dept, r.sup,
        `<span class="font-mono text-xs text-red-600">${r.checkInTime}</span>`,
        r.checkOutTime
          ? `<span class="font-mono bg-gray-100 px-2 py-0.5 rounded text-xs">${r.checkOutTime}</span>`
          : `<span class="text-gray-400 text-xs">ยังไม่ออก</span>`,
        `<span class="font-medium text-green-700">฿${r.total.toLocaleString()}</span>`
      ];
    });
  } else if(type==='absent'){
    const absentEmps=db.employees.filter(e=>!presentIds.has(e._key));
    title=`ขาด/ยังไม่มา (${absentEmps.length} คน)`;
    cols=['ชื่อ-นามสกุล','สายงาน','หัวหน้า','เบอร์โทร'];
    rows=absentEmps.map(e=>[e.name, e.dept||'-', e.sup||'-', e.phone||'-']);
  } else if(type==='ot'){
    const otRecs=records.filter(r=>r.otHours>0);
    title=`ทำโอที (${otRecs.length} คน)`;
    cols=['ชื่อ-นามสกุล','สายงาน','OT (ชม.)','ค่า OT'];
    rows=otRecs.map(r=>[r.empName, r.dept,
      `<span class="badge-yellow px-2 py-0.5 rounded text-xs">${r.otHours} ชม.</span>`,
      `<span class="font-medium text-yellow-700">฿${r.otPay.toLocaleString()}</span>`
    ]);
  } else if(type==='dept'){
    const dRecs=records.filter(r=>r.dept===dept);
    const dEmps=db.employees.filter(e=>e.dept===dept);
    title=`${dept} (มา ${dRecs.length}/${dEmps.length} คน)`;
    cols=['ชื่อ-นามสกุล','หัวหน้า','สถานะ','เวลาเข้า','ค่าแรง'];
    rows=dEmps.map(e=>{
      const rec=dRecs.find(r=>r.empId===e._key);
      return[e.name, e.sup||'-',
        rec?'<span class="badge-green px-2 py-0.5 rounded text-xs">✓ มา</span>'
           :'<span class="badge-red px-2 py-0.5 rounded text-xs">ไม่มา</span>',
        rec?`<span class="font-mono text-xs">${rec.checkInTime}</span>`:'—',
        rec?`<span class="text-green-700 font-medium">฿${rec.total.toLocaleString()}</span>`:'—'
      ];
    });
  }

  // วาด Modal
  const body=`
    <div class="overflow-x-auto max-h-96">
      <table class="min-w-full text-sm">
        <thead class="bg-gray-50 sticky top-0">
          <tr>${cols.map(c=>`<th class="px-4 py-3 text-left text-xs font-semibold text-gray-500 uppercase">${c}</th>`).join('')}</tr>
        </thead>
        <tbody class="divide-y divide-gray-100">
          ${rows.length===0?`<tr><td colspan="${cols.length}" class="px-4 py-8 text-center text-gray-400">ไม่มีข้อมูล</td></tr>`
            :rows.map((r,i)=>`<tr class="${i%2===0?'bg-white':'bg-gray-50'} hover:bg-blue-50">
              ${r.map(c=>`<td class="px-4 py-2.5">${c}</td>`).join('')}
            </tr>`).join('')}
        </tbody>
      </table>
    </div>`;

  openModal(title+` — ${fmtThai(dateKey)}`, body,
    `<button onclick="closeModal()" class="bg-gray-200 hover:bg-gray-300 text-gray-700 px-4 py-2 rounded-lg text-sm font-medium">ปิด</button>`);
};

// ---- Export Excel ภาพรวมวัน ----
window.exportDashExcel=function(dateKey){
  const records=getAttendanceArray(dateKey);
  const wb=XLSX.utils.book_new();

  // Helper: คำนวณชั่วโมงทำงานจาก HH:MM → HH:MM
  const calcHrs = (inT, outT) => {
    if (!inT || !outT) return '';
    const [ih,im] = inT.split(':').map(Number);
    const [oh,om] = outT.split(':').map(Number);
    const mins = (oh*60+om) - (ih*60+im);
    if (mins <= 0) return '';
    return (mins/60).toFixed(2);
  };

  // Sheet 1: รายละเอียดเข้า-ออกงาน
  const s1Data=[
    ['รายงานการเข้า-ออกงาน — '+fmtThai(dateKey)],
    [],
    ['วันที่','ชื่อพนักงาน','สายงาน','หัวหน้างาน','เวลาเข้า','เวลาออก','ชม.ทำงาน','OT (ชม.)','ค่าแรง (฿)','ค่า OT (฿)','รวม (฿)','GPS','วิธี']
  ];
  records.forEach(r=>s1Data.push([
    fmtThai(dateKey),
    r.empName, r.dept, r.sup,
    r.checkInTime||'',
    r.checkOutTime||'-',
    calcHrs(r.checkInTime, r.checkOutTime),
    r.otHours||0,
    r.wage, r.otPay, r.total,
    r.gpsOk?'ตรงจุด':'นอกพื้นที่',
    r.checkInMethod==='face'?'ใบหน้า':'QR'
  ]));
  s1Data.push([]);
  s1Data.push(['','','','รวม','','',
    '',
    parseFloat(records.reduce((s,r)=>s+(r.otHours||0),0).toFixed(1)),
    records.reduce((s,r)=>s+r.wage,0),
    records.reduce((s,r)=>s+r.otPay,0),
    records.reduce((s,r)=>s+r.total,0),'','']);
  const ws1=XLSX.utils.aoa_to_sheet(s1Data);
  ws1['!cols']=[{wch:16},{wch:22},{wch:16},{wch:18},{wch:10},{wch:10},{wch:12},{wch:10},{wch:12},{wch:12},{wch:12},{wch:12},{wch:10}];
  XLSX.utils.book_append_sheet(wb,ws1,'เข้า-ออกงาน');

  // Sheet 2: สรุปรายสายงาน
  const s2Data=[['สรุปแยกสายงาน — '+fmtThai(dateKey)],['สายงาน','พนักงานทั้งหมด','มาทำงาน','ขาด','ออกงานแล้ว','ค่าแรงรวม (฿)']];
  db.departments.forEach(d=>{
    const dr=records.filter(r=>r.dept===d.name);
    const total=db.employees.filter(e=>e.dept===d.name).length;
    s2Data.push([d.name,total,dr.length,total-dr.length,dr.filter(r=>r.checkOutTime).length,dr.reduce((s,r)=>s+r.total,0)]);
  });
  const ws2=XLSX.utils.aoa_to_sheet(s2Data);
  ws2['!cols']=[{wch:20},{wch:16},{wch:12},{wch:8},{wch:14},{wch:14}];
  XLSX.utils.book_append_sheet(wb,ws2,'สรุปสายงาน');

  // Sheet 3: ขาดงาน
  const presentIds=new Set(records.map(r=>r.empId));
  const absentEmps=db.employees.filter(e=>!presentIds.has(e._key));

window.saveAdminSupPwd = async function(key) {
  const newPwd = document.getElementById('sup-new-pwd-input')?.value?.trim();
  const errEl  = document.getElementById('sup-pwd-err');
  const showErr = (msg) => { if(errEl){ errEl.textContent=msg; errEl.classList.remove('hidden'); } };
  if (!newPwd) { showErr('กรุณากรอกรหัสผ่านใหม่'); return; }
  if (newPwd.length < 3) { showErr('รหัสผ่านต้องมีอย่างน้อย 3 ตัวอักษร'); return; }
  showSync();
  try {
    await fbPatch('/supervisors/' + key, { password: newPwd });
    const idx = db.supervisors.findIndex(s => s._key === key);
    if (idx >= 0) db.supervisors[idx].password = newPwd;
    hideSync(); closeModal();
    const textEl = document.getElementById('sup-pwd-text-' + key);
    if (textEl && textEl.textContent !== '••••••') textEl.textContent = newPwd;
    const row = document.getElementById('sup-row-' + key);
    if (row) { row.style.background='#dcfce7'; setTimeout(()=>{row.style.background='';},1500); }
    alert(`✅ เปลี่ยนรหัสผ่านสำเร็จ`);
  } catch(e) { hideSync(); showErr('บันทึกไม่สำเร็จ: ' + e.message); }
};

// ---- Import Employee Excel ----
window.importEmpExcel = async function(input) {
  const file = input.files[0]; if (!file) return;
  input.value = '';
  const reader = new FileReader();
  reader.onload = async e => {
    const data = new Uint8Array(e.target.result);
    const wb   = XLSX.read(data, { type: 'array' });
    const ws   = wb.Sheets[wb.SheetNames[0]];
    const rows = XLSX.utils.sheet_to_json(ws, { header: 1, defval: '' });
    if (rows.length < 2) return alert('ไฟล์ว่างหรือไม่มีข้อมูล');

    // Find header row (row with ชื่อ-นามสกุล)
    let dataStart = 1;
    for (let i = 0; i < Math.min(5, rows.length); i++) {
      if (rows[i].some(c => String(c).includes('ชื่อ-นามสกุล') || String(c).includes('ชื่อ'))) {
        dataStart = i + 1; break;
      }
    }

    const toAdd = [], skipped = [], errors = [];
    for (let i = dataStart; i < rows.length; i++) {
      const row = rows[i];
      if (!row.some(c => c)) continue; // skip empty rows
      const [, name, phone, dept, supName, wageRaw, username, password] = row;
      const nameTrim = String(name||'').trim();
      const userTrim = String(username||'').trim();
      if (!nameTrim || !userTrim) { errors.push(`แถว ${i+1}: ชื่อ/Username ว่าง`); continue; }
      // Check duplicate username
      if (db.employees.find(ex => ex.username === userTrim)) {
        skipped.push(nameTrim + ' (' + userTrim + ')'); continue;
      }
      // Find supervisor by name
      const sup = db.supervisors.find(s => s.name === String(supName||'').trim());
      const deptTrim = String(dept||'').trim();
      const wage = parseInt(wageRaw) || db.wage.defaultWage;
      toAdd.push({
        name: nameTrim,
        phone: String(phone||'').trim(),
        dept: deptTrim,
        sup: sup?.name || String(supName||'').trim(),
        supId: sup?._key || '',
        wage, username: userTrim,
        password: String(password||'1234').trim()
      });
    }

    if (!toAdd.length && !skipped.length && !errors.length) return alert('ไม่พบข้อมูลในไฟล์');

    // Preview modal
    const body = `
      <div style="font-size:13px;margin-bottom:12px;">
        <div style="display:flex;gap:16px;flex-wrap:wrap;margin-bottom:12px;">
          <span style="background:#dcfce7;color:#166534;padding:4px 12px;border-radius:20px;font-weight:600;">✅ เพิ่มได้ ${toAdd.length} คน</span>
          ${skipped.length?`<span style="background:#fef9c3;color:#854d0e;padding:4px 12px;border-radius:20px;font-weight:600;">⏭️ ข้าม ${skipped.length} คน (ซ้ำ)</span>`:''}
          ${errors.length?`<span style="background:#fee2e2;color:#991b1b;padding:4px 12px;border-radius:20px;font-weight:600;">❌ ข้อผิดพลาด ${errors.length}</span>`:''}
        </div>
        ${toAdd.length?`<div style="max-height:200px;overflow-y:auto;border:1px solid #e2e8f0;border-radius:10px;">
          <table style="width:100%;font-size:12px;border-collapse:collapse;">
            <thead style="background:#f8fafc;"><tr>
              <th style="padding:7px 10px;text-align:left;">ชื่อ</th>
              <th style="padding:7px 10px;text-align:left;">สายงาน</th>
              <th style="padding:7px 10px;text-align:left;">Username</th>
              <th style="padding:7px 10px;text-align:right;">ค่าแรง</th>
            </tr></thead>
            <tbody>${toAdd.map((r,i)=>`<tr style="border-top:1px solid #f1f5f9;background:${i%2?'#f8fafc':''}">
              <td style="padding:6px 10px;">${r.name}</td>
              <td style="padding:6px 10px;color:#64748b;">${r.dept||'-'}</td>
              <td style="padding:6px 10px;font-family:monospace;color:#2563eb;">${r.username}</td>
              <td style="padding:6px 10px;text-align:right;">฿${r.wage.toLocaleString()}</td>
            </tr>`).join('')}</tbody>
          </table>
        </div>`:''}
        ${skipped.length?`<div style="margin-top:10px;padding:10px;background:#fef9c3;border-radius:8px;font-size:11px;color:#854d0e;"><strong>ข้ามเนื่องจาก Username ซ้ำ:</strong> ${skipped.join(', ')}</div>`:''}
        ${errors.length?`<div style="margin-top:8px;padding:10px;background:#fee2e2;border-radius:8px;font-size:11px;color:#991b1b;"><strong>ข้อผิดพลาด:</strong><br>${errors.join('<br>')}</div>`:''}
      </div>`;
    openModal('ยืนยันการนำเข้าพนักงาน', body,
      toAdd.length
        ? `<button onclick="doImportEmp()" class="flex-1 bg-indigo-600 hover:bg-indigo-700 text-white py-2.5 rounded-lg text-sm font-bold"><i class="fas fa-upload mr-1"></i>นำเข้า ${toAdd.length} คน</button>
           <button onclick="closeModal()" class="bg-gray-100 text-gray-600 px-4 py-2.5 rounded-lg text-sm">ยกเลิก</button>`
        : `<button onclick="closeModal()" class="bg-gray-200 text-gray-700 px-6 py-2.5 rounded-lg text-sm font-medium">ปิด</button>`);
    window._importQueue = toAdd;
  };
  reader.readAsArrayBuffer(file);
};

window.doImportEmp = async function() {
  const queue = window._importQueue || []; if (!queue.length) return;
  showSync();
  let done = 0;
  for (const rec of queue) {
    const res = await fbPush('/employees', rec);
    db.employees.push({ _key: res.name, ...rec });
    done++;
  }
  window._importQueue = [];
  hideSync();
  closeModal();
  pgEmps();
  alert(`✅ นำเข้าสำเร็จ ${done} คน`);
};

// Inline wage save — fires onchange
window.saveInlineWage = async function(empKey, val) {
  const wage = parseInt(val);
  if (isNaN(wage) || wage < 0) return;
  const idx = db.employees.findIndex(e => e._key === empKey);
  if (idx < 0) return;
  try {
    await fbPatch('/employees/' + empKey, { wage });
    db.employees[idx].wage = wage;
    const input = document.getElementById('emp-wage-'+empKey);
    if (input) { input.style.background='#dcfce7'; setTimeout(()=>{ if(input)input.style.background='#f0fdf4'; },1200); }

window.saveAdminPwd = async function(empKey) {
  const newPwd = document.getElementById('new-pwd-input')?.value?.trim();
  const errEl  = document.getElementById('pwd-err');
  const showErr = (msg) => { if(errEl){ errEl.textContent=msg; errEl.classList.remove('hidden'); } };
  if (!newPwd) { showErr('กรุณากรอกรหัสผ่านใหม่'); return; }
  if (newPwd.length < 3) { showErr('รหัสผ่านต้องมีอย่างน้อย 3 ตัวอักษร'); return; }
  showSync();
  try {
    await fbPatch('/employees/' + empKey, { password: newPwd });
    const idx = db.employees.findIndex(e => e._key === empKey);
    if (idx >= 0) db.employees[idx].password = newPwd;
    hideSync();
    closeModal();
    // Update display in row if visible
    const textEl = document.getElementById('pwd-text-' + empKey);
    if (textEl && textEl.textContent !== '••••••') textEl.textContent = newPwd;
    // Flash the row green briefly
    const row = document.getElementById('emp-row-' + empKey);
    if (row) {
      row.style.background = '#dcfce7';
      setTimeout(() => { row.style.background = ''; }, 1500);
    }
    alert(`✅ เปลี่ยนรหัสผ่านของ ${db.employees[db.employees.findIndex(e=>e._key===empKey)]?.name || empKey} สำเร็จ`);
  } catch(e) {
    hideSync();
    showErr('บันทึกไม่สำเร็จ: ' + e.message);
  }
};

window.saveEmp=async function(){
  const n=document.getElementById('m-en').value.trim(),ph=document.getElementById('m-ep').value.trim();
  const w=parseInt(document.getElementById('m-ew').value)||db.wage.defaultWage;
  const ot=parseInt(document.getElementById('m-eot')?.value)||0;
  const d=document.getElementById('m-ed').value,sv=document.getElementById('m-es').value;
  const [sId,sNm]=sv.split('|');
  const u=document.getElementById('m-eu').value.trim(),pw=document.getElementById('m-epwd').value.trim();
  const ekey=document.getElementById('m-eid').value;
  if(!n)return alert('กรุณากรอกชื่อ');
  showSync();
  if(ekey){
    const upd={name:n,phone:ph,wage:w,dept:d,sup:sNm,supId:sId,username:u};
    if(ot>0)upd.otRate=ot;
    if(pw)upd.password=pw;
    await fbPatch(`/employees/${ekey}`,upd);
    const idx=db.employees.findIndex(x=>x._key===ekey);
    if(idx>=0)db.employees[idx]={...db.employees[idx],...upd};
  } else {
    if(!u||!pw)return alert('กรุณากรอก Username และ Password');
    if(db.employees.find(e=>e.username===u))return alert('Username นี้ถูกใช้แล้ว');
    const rec={name:n,phone:ph,dept:d,sup:sNm,supId:sId,wage:w,username:u,password:pw};
    if(ot>0)rec.otRate=ot;
    const res=await fbPush('/employees',rec);
    db.employees.push({_key:res.name,...rec});
  }
  hideSync(); closeModal(); pgEmps();
};

window.setDeptMode = function(safeId, deptName, mode) {
  // Update button styles
  const btnJob = document.getElementById('btn-job-'+safeId);
  const btnInd = document.getElementById('btn-ind-'+safeId);
  const card   = document.getElementById('dept-card-'+safeId);
  const jobWrap = document.getElementById('job-rate-wrap-'+safeId);
  const indWrap = document.getElementById('ind-info-wrap-'+safeId);
  if (!btnJob) return;
  if (mode === 'job') {
    btnJob.style.cssText += 'background:#3b82f6;color:#fff;border-color:#3b82f6;';
    btnInd.style.cssText += 'background:#fff;color:#f59e0b;border-color:#f59e0b;';
    if (card) card.style.borderColor = '#3b82f6';
    if (jobWrap) jobWrap.style.display = 'flex';
    if (indWrap) indWrap.style.display = 'none';
  } else {
    btnInd.style.cssText += 'background:#f59e0b;color:#fff;border-color:#f59e0b;';
    btnJob.style.cssText += 'background:#fff;color:#3b82f6;border-color:#3b82f6;';

  btnInd.dataset.mode = mode === 'individual' ? 'individual' : '';
};

window.saveWage=async()=>{
  // OT rate is now stored per-dept in deptSettings

  // Collect per-dept settings including time
  const deptSettings = {};
  db.departments.forEach(d => {
    const safeId = d.name.replace(/[^a-zA-Zก-ฮ0-9]/g,'_');
    const btnJob = document.getElementById('btn-job-'+safeId);
    const btnInd = document.getElementById('btn-ind-'+safeId);
    const rateEl = document.getElementById('dw-'+safeId);
    const useTime = document.getElementById('use-time-'+safeId);
    const startEl = document.getElementById('ds-'+safeId);
    const endEl   = document.getElementById('de-'+safeId);
    // Determine mode
    let mode = 'job';
    if (btnJob && btnJob.style.background === 'rgb(255, 255, 255)') mode = 'individual';
    if (btnInd && (btnInd.dataset.mode === 'individual')) mode = 'individual';
    const jobRate = rateEl ? (parseInt(rateEl.value) || db.wage.defaultWage) : db.wage.defaultWage;
    const useCustomTime = useTime ? useTime.checked : false;
    const workStart = (useCustomTime && startEl) ? startEl.value : null;
    const workEnd   = (useCustomTime && endEl)   ? endEl.value   : null;
    const otRateEl = document.getElementById('dot-'+safeId);
    const otRate = otRateEl ? (parseInt(otRateEl.value) || db.wage.otRate || 75) : (db.wage.otRate || 75);
    deptSettings[d.name] = { mode, jobRate, useCustomTime, workStart, workEnd, otRate };
  });
  db.wage.deptSettings = deptSettings;
  db.wage.wageMode = 'dept';

  showSync();
  await fbSet('/settings/wage', db.wage);
  hideSync();
  alert('✅ บันทึกการตั้งค่าสำเร็จ');
  pgWages();
};

async function loadRptMonthly(month){
  await loadAttendanceMonth(month);
  const isSup=CU.role==='supervisor';
  const months=getMonths();
  const mOpts=months.map(m=>`<option value="${m.v}" ${m.v===month?'selected':''}>${m.l}</option>`).join('');
  const em={};
  Object.entries(db.attendance).forEach(([k,bucket])=>{
    if(!k.startsWith(month))return;
    Object.values(bucket||{}).forEach(r=>{
      if(isSup&&r.supId!==CU.id)return;
      if(!em[r.empId])em[r.empId]={...r,days:0,otH:0,wage:0,otPay:0,total:0,places:new Set()};
      em[r.empId].days++;em[r.empId].otH+=r.otHours;em[r.empId].wage+=r.wage;em[r.empId].otPay+=r.otPay;em[r.empId].total+=r.total;em[r.empId].places.add(r.dept);
    });
  });
  const rows=Object.values(em);
  const tW=rows.reduce((s,r)=>s+r.wage,0),tO=rows.reduce((s,r)=>s+r.otPay,0),tA=rows.reduce((s,r)=>s+r.total,0);

  </div>`)}
  <div class="grid grid-cols-4 gap-4 mb-5">
    ${StatCard('พนักงาน',rows.length+' คน','fa-users','blue')}
    ${StatCard('วันทำงาน',rows.reduce((s,r)=>s+r.days,0)+' วัน','fa-calendar','green')}
    ${StatCard('ค่าแรงรวม','฿'+tW.toLocaleString(),'fa-coins','yellow')}
    ${StatCard('รวมทั้งหมด','฿'+tA.toLocaleString(),'fa-sack-dollar','purple')}
  </div>
  <div class="overflow-x-auto"><table class="min-w-full text-sm">${THead('ชื่อพนักงาน','สายงาน','หัวหน้า','วัน','OT(ชม.)','ค่าแรง','ค่าOT','รวม','สถานที่')}
  <tbody>${rows.length===0?EmptyR(9):rows.map(r=>`<tr class="hover:bg-gray-50">
    <td class="px-4 py-2 font-medium">${r.empName}</td>
    <td class="px-4 py-2">${r.dept}</td><td class="px-4 py-2">${r.sup}</td>
    <td class="px-4 py-2 text-center font-bold">${r.days}</td>
    <td class="px-4 py-2 text-center">${r.otH>0?r.otH.toFixed(1):'-'}</td>
    <td class="px-4 py-2 text-right">฿${r.wage.toLocaleString()}</td>
    <td class="px-4 py-2 text-right">฿${r.otPay.toLocaleString()}</td>
    <td class="px-4 py-2 text-right font-bold text-blue-700">฿${r.total.toLocaleString()}</td>
    <td class="px-4 py-2 text-xs text-gray-400">${[...r.places].join(', ')}</td>

    <td colspan="3" class="px-4 py-2 text-right">รวม</td>
    <td class="px-4 py-2 text-center">${rows.reduce((s,r)=>s+r.days,0)}</td><td></td>

window.filterEmpRptList = function(q) {
  const drop = document.getElementById('re-search-drop');
  if (!q.trim()) { drop.style.display = 'none'; return; }
  const qLow = q.toLowerCase();
  const matched = db.employees.filter(e =>
    e.name.toLowerCase().includes(qLow) ||
    (e.dept||'').toLowerCase().includes(qLow) ||
    (e.sup||'').toLowerCase().includes(qLow) ||
    (e.username||'').toLowerCase().includes(qLow)
  ).slice(0, 8);
  if (!matched.length) {
    drop.style.display = 'block';
    drop.innerHTML = `<div style="padding:14px;font-size:13px;color:#94a3b8;text-align:center;">ไม่พบพนักงาน</div>`;
    return;
  }
  drop.style.display = 'block';
  drop.innerHTML = matched.map(e => {
    const hasFace = (e.faceDescriptors && e.faceDescriptors.length > 0) || e.faceDescriptor;
    return `<div onclick="selectEmpRpt('${e._key}')"
      style="padding:11px 14px;cursor:pointer;display:flex;align-items:center;gap:10px;border-bottom:1px solid #f1f5f9;transition:background .15s;"

window.loadEmpRpt=async function(){
  const ekey=document.getElementById('re-emp').value;
  const month=document.getElementById('re-mon').value;
  if(!ekey){ alert('กรุณาเลือกพนักงานก่อน'); document.getElementById('re-search')?.focus(); return; }
  const emp=db.employees.find(e=>e._key===ekey);
  document.getElementById('re-area').innerHTML='<div class="flex justify-center py-10"><div class="loading-spinner" style="width:32px;height:32px;border-width:3px;"></div></div>';
  await loadAttendanceMonth(month);
  const recs=[];
  Object.entries(db.attendance).forEach(([k,bucket])=>{
    if(!k.startsWith(month))return;
    const r=Object.values(bucket||{}).find(r=>r.empId===ekey||r.empId===emp?._key);
    if(r)recs.push({...r,dk:k});
  });
  recs.sort((a,b)=>a.dk.localeCompare(b.dk));

// Fly map to a location and open popup
window.flyToLocation = function(id) {
  const idx = gpsLocations.findIndex(l => l.id === id);
  if (idx < 0 || !_leafletMap) return;
  const loc = gpsLocations[idx];
  _leafletMap.flyTo([loc.lat, loc.lng], 17, { animate: true, duration: 0.8 });
  if (_leafletMarkers[idx]) {
    setTimeout(() => _leafletMarkers[idx].openPopup(), 900);
  }
};

function _initLeafletMap() {
  if (_leafletMap) { _leafletMap.remove(); _leafletMap = null; }
  const center = gpsLocations.length
    ? [gpsLocations[0].lat, gpsLocations[0].lng]
    : [13.7563, 100.5018];
  _leafletMap = L.map('gps-map', { zoomControl: true }).setView(center, gpsLocations.length > 1 ? 13 : 15);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
    maxZoom: 19
  }).addTo(_leafletMap);

  // Fit bounds to all locations
  if (gpsLocations.length > 1) {
    const bounds = gpsLocations.map(l => [l.lat, l.lng]);
    _leafletMap.fitBounds(bounds, { padding: [40, 40] });
  }

  const colors = ['#0891b2','#16a34a','#dc2626','#7c3aed','#d97706','#db2777'];
  _leafletMarkers = []; _leafletCircles = [];
  gpsLocations.forEach((loc, i) => _addLocToMap(loc, i, colors[i % colors.length]));

  // Click on map → prefill modal
  _leafletMap.on('click', e => {
    _pendingLatLng = e.latlng;
    // Reset modal
    document.getElementById('loc-name').value = '';
    document.getElementById('loc-lat').value = e.latlng.lat.toFixed(6);
    document.getElementById('loc-lng').value = e.latlng.lng.toFixed(6);
    document.getElementById('loc-radius').value = 100;
    document.getElementById('loc-radius-val').textContent = '100';
    document.getElementById('loc-edit-id').value = '';
    document.getElementById('loc-search').value = '';
    document.getElementById('loc-search-results').style.display = 'none';
    document.getElementById('loc-modal-title').textContent = 'เพิ่มสถานที่';
    document.getElementById('loc-modal').style.display = 'flex';
    _showMiniMap(e.latlng.lat, e.latlng.lng, 100);
  });
}

function _addLocToMap(loc, i, color) {
  const icon = L.divIcon({
    className: '',
    html: `<div style="background:${color};color:#fff;border-radius:50%;width:36px;height:36px;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700;box-shadow:0 3px 10px rgba(0,0,0,.35);border:3px solid #fff;transition:transform .2s;" onmouseover="this.style.transform='scale(1.15)'" onmouseout="this.style.transform='scale(1)'">${i+1}</div>`,
    iconSize: [36,36], iconAnchor: [18,18]
  });
  const marker = L.marker([loc.lat, loc.lng], { icon }).addTo(_leafletMap)
    .bindPopup(`
      <div style="font-family:Sarabun,sans-serif;min-width:140px;">
        <div style="font-weight:700;font-size:14px;color:#1e293b;margin-bottom:4px;">
          <span style="background:${color};color:#fff;border-radius:50%;width:22px;height:22px;display:inline-flex;align-items:center;justify-content:center;font-size:12px;margin-right:6px;">${i+1}</span>
          ${loc.name}
        </div>
        <div style="font-size:11px;color:#64748b;font-family:monospace;">${Number(loc.lat).toFixed(5)}, ${Number(loc.lng).toFixed(5)}</div>
        <div style="margin-top:6px;background:${color}18;color:${color};font-size:11px;padding:3px 8px;border-radius:8px;display:inline-block;font-weight:600;">
          <i class="fas fa-circle-notch" style="font-size:9px;"></i> รัศมี ${loc.radius} ม.
        </div>
      </div>`, { maxWidth: 200 });
  const circle = L.circle([loc.lat, loc.lng], {
    radius: loc.radius,
    color, fillColor: color, fillOpacity: 0.13, weight: 2.5,
    dashArray: '6 4'
  }).addTo(_leafletMap);
  _leafletMarkers.push(marker);
  _leafletCircles.push(circle);
}

// Mini map inside modal (preview)
let _miniMap = null;
let _miniMarker = null;
let _miniCircle = null;

function _showMiniMap(lat, lng, radius) {
  const el = document.getElementById('loc-mini-map');
  if (!el) return;
  el.style.display = 'block';
  if (!_miniMap) {
    _miniMap = L.map('loc-mini-map', { zoomControl: false, attributionControl: false }).setView([lat, lng], 16);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 19 }).addTo(_miniMap);
  } else {
    _miniMap.setView([lat, lng], 16);
  }
  if (_miniMarker) _miniMap.removeLayer(_miniMarker);
  if (_miniCircle) _miniMap.removeLayer(_miniCircle);
  _miniMarker = L.marker([lat, lng]).addTo(_miniMap);
  _miniCircle = L.circle([lat, lng], { radius, color:'#dc2626', fillColor:'#dc2626', fillOpacity:0.15, weight:2 }).addTo(_miniMap);
  setTimeout(() => _miniMap.invalidateSize(), 80);
}

function _updateMiniMap() {
  const lat = parseFloat(document.getElementById('loc-lat').value);
  const lng = parseFloat(document.getElementById('loc-lng').value);
  const r   = parseInt(document.getElementById('loc-radius').value) || 100;
  if (!isNaN(lat) && !isNaN(lng)) _showMiniMap(lat, lng, r);
}

// Sync lat/lng inputs to mini map
function _onCoordChange() {
  const lat = parseFloat(document.getElementById('loc-lat').value);
  const lng = parseFloat(document.getElementById('loc-lng').value);
  const r   = parseInt(document.getElementById('loc-radius').value) || 100;
  if (!isNaN(lat) && !isNaN(lng)) _showMiniMap(lat, lng, r);
}

window.saveLocation = async function() {
  const name   = document.getElementById('loc-name').value.trim();
  const lat    = parseFloat(document.getElementById('loc-lat').value);
  const lng    = parseFloat(document.getElementById('loc-lng').value);
  const radius = parseInt(document.getElementById('loc-radius').value) || 100;
  const editId = document.getElementById('loc-edit-id').value;
  if (!name) return alert('กรุณากรอกชื่อสถานที่');
  if (isNaN(lat) || isNaN(lng)) return alert('กรุณากรอกพิกัดให้ถูกต้อง');
  showSync();
  const payload = { name, lat, lng, radius };
  if (editId) {
    await fbPatch('/settings/gpsLocations/' + editId, payload);
    const idx = gpsLocations.findIndex(l => l.id === editId);
    if (idx >= 0) gpsLocations[idx] = { id: editId, ...payload };
  } else {
    const res = await fbPush('/settings/gpsLocations', payload);
    gpsLocations.push({ id: res.name, ...payload });
  }
  if (gpsLocations.length) hrGPS = gpsLocations[0];
  hideSync();
  closeLocModal();
  _renderLocList();
  _initLeafletMap();
};

// ---- Current GPS — high-accuracy with watchPosition + timeout ----
window.useCurrentGPS = function(e) {
  if (!navigator.geolocation) return alert('เบราว์เซอร์ไม่รองรับ GPS');
  e && e.preventDefault && e.preventDefault();
  const btn = document.getElementById('btn-use-gps');
  if (btn) { btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> กำลังค้นหา...'; btn.disabled = true; }

  let watchId = null;
  let best = null;
  const ACCURACY_TARGET = 30; // meters — accept if ≤ this
  const TIMEOUT_MS      = 12000;

  const done = (pos) => {
    if (watchId !== null) { navigator.geolocation.clearWatch(watchId); watchId = null; }
    const la = pos.coords.latitude.toFixed(6);
    const ln = pos.coords.longitude.toFixed(6);
    document.getElementById('loc-lat').value = la;
    document.getElementById('loc-lng').value = ln;
    const r = parseInt(document.getElementById('loc-radius').value) || 100;
    _showMiniMap(parseFloat(la), parseFloat(ln), r);
    if (_leafletMap) _leafletMap.flyTo([parseFloat(la), parseFloat(ln)], 17, { animate:true, duration:0.8 });
    if (btn) {
      btn.innerHTML = `<i class="fas fa-check-circle" style="color:#16a34a;"></i> แม่นยำ ${Math.round(pos.coords.accuracy)} ม.`;
      btn.disabled = false;
      setTimeout(() => { if(btn) btn.innerHTML = '<i class="fas fa-crosshairs"></i> ตำแหน่งปัจจุบัน'; }, 4000);
    }
  };

  const fail = () => {
    if (watchId !== null) { navigator.geolocation.clearWatch(watchId); watchId = null; }
    if (best) { done(best); return; }
    if (btn) { btn.innerHTML = '<i class="fas fa-crosshairs"></i> ตำแหน่งปัจจุบัน'; btn.disabled = false; }
    alert('ไม่สามารถดึงตำแหน่งได้\nกรุณาเปิด GPS บนอุปกรณ์ และอนุญาตการเข้าถึงตำแหน่ง');
  };

  // Auto-stop after timeout
  const timer = setTimeout(() => { if (best) done(best); else fail(); }, TIMEOUT_MS);

  watchId = navigator.geolocation.watchPosition(pos => {
    const acc = pos.coords.accuracy;
    if (!best || acc < best.coords.accuracy) best = pos;
    if (acc <= ACCURACY_TARGET) {
      clearTimeout(timer);
      done(pos);
    }
  }, () => {
    clearTimeout(timer);
    fail();
  }, {
    enableHighAccuracy: true,
    timeout: TIMEOUT_MS,
    maximumAge: 0
  });
};

let _searchTimer = null;

window.searchLoc = async function() {
  const q = document.getElementById('loc-search').value.trim();
  if (!q) return;
  const res = document.getElementById('loc-search-results');
  res.style.display = 'block';
  res.innerHTML = '<div style="padding:10px 14px;font-size:12px;color:#64748b;font-family:Sarabun,sans-serif;"><i class="fas fa-spinner fa-spin mr-2"></i>กำลังค้นหา...</div>';
  try {
    const url = `https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(q)}&limit=6&accept-language=th`;
    const r = await fetch(url, { headers: { 'Accept-Language': 'th,en' } });
    const data = await r.json();
    if (!data.length) {
      res.innerHTML = '<div style="padding:10px 14px;font-size:12px;color:#94a3b8;font-family:Sarabun,sans-serif;">ไม่พบสถานที่</div>';
      return;
    }
    res.innerHTML = data.map((p, i) => `
      <div onclick="selectSearchResult(${p.lat},${p.lon},${JSON.stringify(p.display_name).replace(/"/g,'&quot;')})"
        style="padding:10px 14px;cursor:pointer;border-bottom:1px solid #f1f5f9;font-family:Sarabun,sans-serif;transition:background .15s;"
        onmouseover="this.style.background='#f0fdfa'" onmouseout="this.style.background='#fff'">
        <div style="font-size:13px;font-weight:600;color:#1e293b;line-height:1.4;">${p.display_name.split(',').slice(0,2).join(',')}</div>
        <div style="font-size:11px;color:#94a3b8;margin-top:2px;font-family:monospace;">${Number(p.lat).toFixed(5)}, ${Number(p.lon).toFixed(5)}</div>
      </div>`).join('');
  } catch(e) {
    res.innerHTML = '<div style="padding:10px 14px;font-size:12px;color:#ef4444;font-family:Sarabun,sans-serif;">ค้นหาไม่สำเร็จ ลองใหม่อีกครั้ง</div>';
  }
};

window.switchQRTab = function(type){

  const genBtn = document.getElementById('qr-gen-btn');
  const borderBox = document.getElementById('qr-border-box');
  const typeLabel = document.getElementById('qr-type-label');
  const listTitle = document.getElementById('qr-list-title');
  const ring = document.getElementById('qr-ring');
  const cd   = document.getElementById('qr-cd');

  if(tabIn){tabIn.style.background=isIn?'#16a34a':'#f1f5f9';tabIn.style.color=isIn?'#fff':'#64748b';}
  if(tabOut){tabOut.style.background=isIn?'#f1f5f9':'#dc2626';tabOut.style.color=isIn?'#64748b':'#fff';}
  if(genBtn){
    genBtn.style.background=isIn?'#16a34a':'#dc2626';
    genBtn.innerHTML=isIn?'<i class="fas fa-qrcode mr-2"></i>สร้าง QR Code เข้างาน':'<i class="fas fa-qrcode mr-2"></i>สร้าง QR Code ออกงาน';
  }
  if(borderBox) borderBox.style.borderColor=isIn?'#bbf7d0':'#fecaca';
  if(typeLabel) typeLabel.textContent=isIn?'QR เข้างาน':'QR ออกงาน';
  if(typeLabel) typeLabel.style.color=isIn?'#15803d':'#dc2626';
  if(ring) ring.setAttribute('stroke',isIn?'#16a34a':'#dc2626');
  if(cd)   cd.style.color=isIn?'#16a34a':'#dc2626';
  if(listTitle) listTitle.textContent=isIn?'เช็คชื่อเข้าแล้ว':'สแกนออกแล้ว';
  // re-gen QR
  if(document.getElementById('qr-area')?.classList.contains('hidden')===false) genQR();
};

  if(!sid){alert('กรุณาเลือกหัวหน้างาน');return;}
  document.getElementById('qr-area')?.classList.remove('hidden');
  if(qrTimer)clearInterval(qrTimer);
  const type = window._qrType||'IN';
  const isIn = type==='IN';
  const qrColor = isIn?'#15803d':'#991b1b';

  function makeQR(){
    const now=new Date(),ds=todayStr,tb=Math.floor(now.getTime()/(15*60*1000));
    const token=`${sid}|${ds}|${tb}|HR2PS2026|${type}`;
    window._activeToken=token;
    const dl=document.getElementById('qr-dl');
    if(dl)dl.textContent=now.toLocaleDateString('th-TH',{year:'numeric',month:'long',day:'numeric'});
    const box=document.getElementById('qr-box');
    if(box){box.innerHTML='';new QRCode(box,{text:token,width:160,height:160,colorDark:qrColor,colorLight:'#fff',correctLevel:QRCode.CorrectLevel.H});}
    qrExp=new Date(now.getTime()+15*60*1000);
    refreshAttendList();
  }
  makeQR();
  subscribeToday(todayStr, refreshAttendList);

  qrTimer=setInterval(()=>{
    const rem=Math.max(0,Math.floor((qrExp-new Date())/1000));
    const ring=document.getElementById('qr-ring'),cd=document.getElementById('qr-cd');
    const activeColor = (window._qrType||'IN')==='IN'?'#16a34a':'#dc2626';
    if(ring){ring.setAttribute('stroke-dashoffset',(94*(1-rem/900)).toFixed(1));ring.setAttribute('stroke',rem<60?'#ef4444':activeColor);}
    if(cd)cd.textContent=Math.floor(rem/60)+':'+String(rem%60).padStart(2,'0');
    if(rem===0)makeQR();
  },1000);
};

function refreshAttendList(){
  const el=document.getElementById('qr-attend-list');if(!el)return;
  const allRecs=getAttendanceArray(todayStr);
  const type=window._qrType||'IN';

  const mBadge = m => m==='face'
    ? `<span style="background:#f5f3ff;color:#7c3aed;font-size:9px;padding:1px 5px;border-radius:6px;font-weight:600;"><i class="fas fa-smile" style="margin-right:2px;font-size:8px;"></i>ใบหน้า</span>`
    : `<span style="background:#dbeafe;color:#1e40af;font-size:9px;padding:1px 5px;border-radius:6px;font-weight:600;"><i class="fas fa-qrcode" style="margin-right:2px;font-size:8px;"></i>QR</span>`;

  if(type==='IN'){
    const recs=allRecs;
    if(!recs.length){el.innerHTML='<div class="text-xs text-gray-400 text-center py-3">ยังไม่มีพนักงานเช็คชื่อ</div>';return;}
    el.innerHTML=`<div class="text-xs font-bold text-green-600 mb-2">✅ เข้างานแล้ว ${recs.length} คน</div>`
      +recs.map((r,i)=>`<div class="flex items-center justify-between text-xs py-1.5 border-b border-gray-100 last:border-0">
        <span class="text-gray-700"><span class="text-gray-300 mr-1">${i+1}.</span>${r.empName}</span>
        <div class="flex items-center gap-1.5">
          ${mBadge(r.checkInMethod)}
          <span class="font-mono text-gray-400">${r.checkInTime}</span>
          ${r.gpsOk?bdg('green','✓GPS'):bdg('red','✗GPS')}
          ${r.checkOutTime?'<span style="background:#dbeafe;color:#1e40af;font-size:10px;padding:1px 5px;border-radius:6px;">ออกแล้ว</span>':''}
        </div></div>`).join('');
  } else {
    if(!allRecs.length){el.innerHTML='<div class="text-xs text-gray-400 text-center py-3">ยังไม่มีพนักงานเข้างาน</div>';return;}
    const outDone=allRecs.filter(r=>r.checkOutTime);
    const pending=allRecs.filter(r=>!r.checkOutTime);
    el.innerHTML=
      (outDone.length?`<div class="text-xs font-bold mb-1" style="color:#dc2626">✔ ออกงานแล้ว ${outDone.length} คน</div>`+
        outDone.map(r=>`<div class="flex items-center justify-between text-xs py-1.5 border-b border-gray-100">
          <span class="text-gray-700">${r.empName}</span>
          <div class="flex items-center gap-1.5">${mBadge(r.checkOutMethod)}<span class="font-mono" style="color:#dc2626">${r.checkOutTime}</span></div>
        </div>`).join(''):'')
      +(pending.length?`<div class="text-xs font-bold mt-2 mb-1 text-gray-500">⏳ ยังไม่สแกนออก ${pending.length} คน</div>`+
        pending.map(r=>`<div class="flex items-center justify-between text-xs py-1.5 border-b border-gray-100">
          <span class="text-gray-700">${r.empName}</span>
          <span class="text-gray-400 font-mono">${r.checkInTime} เข้า</span>
        </div>`).join(''):'');
  }
  // Also refresh face panel if visible
  refreshFaceSupPanel();
}

// =====================================================================
function getCurrentUserAsEmpObj() {
  if (CU.role === 'employee') {
    return db.employees.find(e => e._key === CU.id) || null;
  }
  if (CU.role === 'supervisor') {
    const sup = db.supervisors.find(s => s._key === CU.id);
    if (!sup) return null;
    // แปลงเป็น empObj format
    return {
      _key:   CU.id,
      name:   sup.name,
      dept:   sup.dept || '-',
      sup:    '-',
      supId:  null,
      wage:   sup.wage || db.wage.defaultWage,
      username: sup.username,
      _isSupervisor: true
    };
  }
  return null;
}

// ตรวจสอบว่าผู้ใช้ปัจจุบันเช็คชื่อแล้ววันนี้หรือยัง
function hasCheckedInToday() {
  return !!getAttendanceArray(todayStr).find(r => r.empId === CU.id);
}
function hasCheckedOutToday() {
  const rec = getAttendanceArray(todayStr).find(r => r.empId === CU.id);
  return !!(rec && rec.checkOutTime);
}

async function _renderEmpCheckinView(){
  const wrap=document.getElementById('ci-page');if(!wrap)return;
  const empObj=getCurrentUserAsEmpObj();
  if(!empObj){wrap.innerHTML='<p class="text-gray-400 text-center py-10">ไม่พบข้อมูลผู้ใช้</p>';return;}

  // โหลด attendance วันนี้
  await loadAttendanceDate(todayStr);
  const alr=getAttendanceArray(todayStr).find(r=>r.empId===empObj._key);

  if(alr){
    // เช็คชื่อแล้ว — แสดงผลสำเร็จ + ประวัติล่าสุด
    _renderCheckinDone(wrap,empObj,alr);
  } else {

window.openCam=function(){
  window._camMode='IN';
  document.getElementById('cam-modal').classList.add('active');
  document.getElementById('cam-msg').classList.add('hidden');
  startCam();
};
window.openCamCheckout=function(){
  window._camMode='OUT';
  document.getElementById('cam-modal').classList.add('active');
  document.getElementById('cam-msg').classList.add('hidden');
  startCam();
};
window.stopCam=function(){
  document.getElementById('cam-modal').classList.remove('active');
  if(camStream){camStream.getTracks().forEach(t=>t.stop());camStream=null;}
  camScanning=false;
};
async function startCam(){
  showCamMsg('info','กำลังเปิดกล้อง...');
  try{
    // ลอง back camera ก่อน ถ้าไม่มีค่อย fallback เป็น any camera
    let stream;
    try{
      stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:{exact:'environment'}},audio:false});
    }catch{
      stream=await navigator.mediaDevices.getUserMedia({video:true,audio:false});
    }
    camStream=stream;
    const v=document.getElementById('cam-vid');
    v.srcObject=camStream;
    await v.play();
    showCamMsg('info','จ่อกล้องไปที่ QR Code...');
    camScanning=true;
    scanF();
  }catch(e){
    let msg='ไม่สามารถเปิดกล้องได้';
    if(e.name==='NotAllowedError'||e.name==='PermissionDeniedError'){
      msg='กรุณาอนุญาตการเข้าถึงกล้องในเบราว์เซอร์ แล้วลองใหม่';
    }else if(e.name==='NotFoundError'){
      msg='ไม่พบกล้องในอุปกรณ์นี้';
    }else{
      msg='เปิดกล้องไม่ได้: '+e.message;
    }
    showCamMsg('error',msg);
  }
}
function scanF(){
  if(!camScanning)return;
  const v=document.getElementById('cam-vid');
  if(!v||v.readyState<v.HAVE_ENOUGH_DATA){requestAnimationFrame(scanF);return;}

  // วาด frame ลง canvas
  const c=document.createElement('canvas');
  c.width=v.videoWidth||320;c.height=v.videoHeight||240;
  const ctx=c.getContext('2d');
  ctx.drawImage(v,0,0,c.width,c.height);
  const imageData=ctx.getImageData(0,0,c.width,c.height);

  // ลอง jsQR ก่อน (รองรับทุก browser — Firefox, Safari, Chrome, Edge)
  if(typeof jsQR==='function'){
    const result=jsQR(imageData.data,imageData.width,imageData.height,{inversionAttempts:'dontInvert'});
    if(result&&result.data){onQRFound(result.data);return;}
    requestAnimationFrame(scanF);return;
  }

  // ถ้า jsQR ยังโหลดไม่เสร็จ ลอง BarcodeDetector
  if('BarcodeDetector' in window){
    new BarcodeDetector({formats:['qr_code']}).detect(c).then(codes=>{
      if(codes.length>0)onQRFound(codes[0].rawValue);else requestAnimationFrame(scanF);
    }).catch(()=>requestAnimationFrame(scanF));
    return;
  }

  // fallback สุดท้าย — รอ jsQR โหลด
  setTimeout(()=>requestAnimationFrame(scanF),200);
}

// เมื่อสแกนเจอ QR
function onQRFound(token){
  camScanning=false;
  stopCam();
  if(CU.role==='employee'){
    // ตรวจ type จาก token
    const parts=token.split('|');
    const tokenType=parts[4]||'IN';
    if(tokenType==='OUT'){
      _empAutoCheckOut(token);
    } else {
      _empAutoCheckIn(token);
    }
  } else {
    const ti=document.getElementById('ci-tok');if(ti)ti.value=token;
    showCamMsg('ok','✅ สแกนสำเร็จ! กดเช็คชื่อได้เลย');
  }
}

function valToken(tok){
  const p=tok.split('|');
  // รองรับทั้ง format เก่า (4 ส่วน=IN) และใหม่ (5 ส่วน พร้อม type)
  if(p.length<4)return{ok:false,msg:'Token ไม่ถูกต้อง'};
  const[sid,ds,tb,sec]=p;
  const type=p[4]||'IN'; // default = IN
  if(sec!=='HR2PS2026')return{ok:false,msg:'Token ไม่ผ่านการรับรอง'};
  const now=new Date();if(ds!==todayStr)return{ok:false,msg:'Token เป็นของวันอื่น'};
  const cb=Math.floor(now.getTime()/(15*60*1000));
  if(Math.abs(cb-parseInt(tb))>1)return{ok:false,msg:'QR Code หมดอายุแล้ว'};
  return{ok:true,sid,type};
}
function distM(a,b,c,d){const R=6371e3,p1=a*Math.PI/180,p2=c*Math.PI/180,dp=(c-a)*Math.PI/180,dl=(d-b)*Math.PI/180;const x=Math.sin(dp/2)**2+Math.cos(p1)*Math.cos(p2)*Math.sin(dl/2)**2;return R*2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x));}

window.doCI=async function(){
  const empKey=document.getElementById('ci-emp')?.value;
  const tok=document.getElementById('ci-tok')?.value.trim();
  const ot=parseFloat(document.getElementById('ci-ot')?.value)||0;
  const sEl=document.getElementById('ci-status'),bEl=document.getElementById('ci-btn');
  if(!empKey)return alert('กรุณาเลือกพนักงาน');
  if(!tok)return alert('กรุณากรอก Token หรือสแกน QR');

  // Reload today's attendance first to get fresh duplicate check
  await loadAttendanceDate(todayStr);
  if(getAttendanceArray(todayStr).find(r=>r.empId===empKey)){
    showSt(sEl,'error','❌ ลงชื่อซ้ำ! พนักงานนี้เช็คชื่อแล้ววันนี้');return;
  }
  const tv=valToken(tok);if(!tv.ok){showSt(sEl,'error','❌ '+tv.msg);return;}
  showSt(sEl,'info','กำลังค้นหาพิกัด GPS... <i class="fas fa-spinner fa-spin ml-1"></i>');

  const doRecord=async(gpsOk,dist=0)=>{
    const emp=db.employees.find(x=>x._key===empKey);if(!emp)return;
    const now=new Date(),ts=String(now.getHours()).padStart(2,'0')+':'+String(now.getMinutes()).padStart(2,'0');
    const wage=getEffectiveWage(emp),otPay=ot*getEffectiveOTRate(emp);
    const rec={
      empId:emp._key, empName:emp.name, dept:emp.dept, sup:emp.sup, supId:emp.supId||tv.sid,
      checkInTime:ts, otHours:ot, wage, otPay, total:wage+otPay, gpsOk,
      distMeters:Math.round(dist), timestamp:Date.now()
    };
    showSync();
    try {
      // Write to Firebase
      const res=await fbPush(`/attendance/${todayStr}`,rec);
      // Update local cache
      if(!db.attendance[todayStr])db.attendance[todayStr]={};
      db.attendance[todayStr][res.name]=rec;
      if(gpsOk)showSt(sEl,'success',`✅ <strong>เช็คชื่อสำเร็จ!</strong><br>เวลา ${ts} · อยู่ในรัศมี ${Math.round(dist)} ม.<br>ค่าแรงวันนี้: ฿${(wage+otPay).toLocaleString()}`);
      else showSt(sEl,'warn',`⚠️ บันทึกแล้ว (นอกพื้นที่ ${Math.round(dist)} ม.) — บันทึก GPS เตือน HR`);
      if(bEl)bEl.classList.add('hidden');
      refreshAttendList();
    } catch(e){
      showSt(sEl,'error','❌ บันทึกไม่สำเร็จ: '+e.message);
    }
    hideSync();
  };

  if(navigator.geolocation){
    navigator.geolocation.getCurrentPosition(
      pos=>{const g=gpsInAny(pos.coords.latitude,pos.coords.longitude);doRecord(g.ok,g.dist);},
      ()=>doRecord(false,9999),
      {enableHighAccuracy:true,timeout:10000,maximumAge:0}
    );
  } else doRecord(false,9999);
};
function showSt(el,t,msg){
  const c={success:'bg-green-100 text-green-800 border border-green-300',error:'bg-red-100 text-red-800 border border-red-300',warn:'bg-yellow-100 text-yellow-800 border border-yellow-300',info:'bg-blue-100 text-blue-800 border border-blue-300'};
  el.className=`mt-4 p-4 rounded-xl text-sm font-medium ${c[t]}`;el.innerHTML=msg;el.classList.remove('hidden');
}
