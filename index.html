// =====================================================================
//  REALTIME POLLING (replaces Firebase SDK listeners)
// =====================================================================
let _todayPollTimer = null;
let _todaySSE = null;  // Firebase SSE connection
function subscribeToday(dateKey, cb) {
  unsubscribeTodayListener();

  // Firebase SSE Realtime — รับ event ทันทีเมื่อมีการเปลี่ยนแปลง
  const url = `${FB}/attendance/${dateKey}.json?auth=${FB_KEY}`;
  try {
    const sse = new EventSource(url);
    _todaySSE = sse;
    sse.addEventListener('put', async (e) => {
      try {
        const payload = JSON.parse(e.data);
        if (payload && payload.data !== undefined) {
          // อัพเดท in-memory cache
          if (payload.path === '/') {
            db.attendance[dateKey] = payload.data || {};
          } else {
            const key = payload.path.replace('/', '');
            if (!db.attendance[dateKey]) db.attendance[dateKey] = {};
            if (payload.data === null) {
              delete db.attendance[dateKey][key];
            } else {
              db.attendance[dateKey][key] = payload.data;
            }
          }
          cb(); // re-render UI
        }
      } catch(_) {}
    });
    sse.addEventListener('patch', async (e) => {
      try {
        const payload = JSON.parse(e.data);
        if (payload && payload.data) {
          if (!db.attendance[dateKey]) db.attendance[dateKey] = {};
          Object.assign(db.attendance[dateKey], payload.data);
          cb();
        }
      } catch(_) {}
    });
    sse.onerror = () => {
      // fallback to polling on SSE error
      sse.close();
      _todaySSE = null;
      _todayPollTimer = setInterval(async () => {
        await loadAttendanceDate(dateKey); cb();
      }, 20000);
    };
  } catch(_) {
    // SSE not supported — fallback poll
    _todayPollTimer = setInterval(async () => {
      await loadAttendanceDate(dateKey); cb();
    }, 20000);
  }
}
function unsubscribeTodayListener() {
  if (_todaySSE)  { _todaySSE.close(); _todaySSE = null; }
  if (_todayPollTimer) { clearInterval(_todayPollTimer); _todayPollTimer = null; }
}

// Load face-api.js models from CDN
async function loadFaceModels() {
  if (faceModelsLoaded) return true;
  if (faceModelsLoading) {
    return new Promise(resolve => {
      const chk = setInterval(() => {
        if (faceModelsLoaded) { clearInterval(chk); resolve(true); }
        if (!faceModelsLoading) { clearInterval(chk); resolve(false); }
      }, 300);
    });
  }
  faceModelsLoading = true;
  setFaceStatus('info', 'กำลังโหลดโมเดล AI... (ครั้งแรกอาจใช้เวลา 15-30 วินาที)');
  showFaceProgress(0, 'โหลด TinyFaceDetector...');
  try {
    await faceapi.nets.tinyFaceDetector.loadFromUri(FACE_MODEL_URL);
    showFaceProgress(40, 'โหลด FaceLandmarks...');
    await faceapi.nets.faceLandmark68TinyNet.loadFromUri(FACE_MODEL_URL);
    showFaceProgress(75, 'โหลด FaceRecognition...');
    await faceapi.nets.faceRecognitionNet.loadFromUri(FACE_MODEL_URL);
    showFaceProgress(100, 'โหลดสำเร็จ!');
    faceModelsLoaded = true;
    faceModelsLoading = false;
    hideFaceProgress();
    return true;
  } catch(e) {
    faceModelsLoading = false;
    hideFaceProgress();
    console.error('Face model load error:', e);
    return false;
  }
}

function showFaceProgress(pct, txt) {
  const w = document.getElementById('face-progress-wrap');
  const b = document.getElementById('face-progress-bar');
  const t = document.getElementById('face-progress-text');
  if (w) w.style.display = 'block';
  if (b) b.style.width = pct + '%';
  if (t) t.textContent = txt;
}
function hideFaceProgress() {
  const w = document.getElementById('face-progress-wrap');
  if (w) w.style.display = 'none';
}

function setFaceStatus(type, msg) {
  const el = document.getElementById('face-status');
  if (!el) return;
  const s = {
    success: 'background:#dcfce7;color:#166534;',
    error:   'background:#fee2e2;color:#991b1b;',
    warn:    'background:#fef9c3;color:#854d0e;',
    info:    'background:#dbeafe;color:#1e40af;'
  };
  el.style.cssText = `margin-top:14px;padding:12px 16px;border-radius:14px;text-align:center;font-size:13px;font-weight:600;transition:all .3s;${s[type]||s.info}`;
  el.innerHTML = type==='info' ? `<i class="fas fa-spinner fa-spin" style="margin-right:6px;"></i>${msg}` : msg;
}
function setFaceRing(color) {
  const r = document.getElementById('face-ring');
  if (!r) return;
  const colorMap = { green:'#22c55e', red:'#ef4444', yellow:'#eab308', blue:'#22d3ee', gray:'#475569' };
  const hex = colorMap[color] || colorMap.blue;
  r.style.borderColor = hex;
  r.classList.toggle('face-ring-pulse', color !== 'green' && color !== 'red');
  // Glow class
  r.classList.remove('green','red','yellow');
  if (color === 'green' || color === 'red' || color === 'yellow') r.classList.add(color);
  // Sync radar line color
  const radar = document.getElementById('face-radar-line');
  const glow  = document.getElementById('face-radar-glow');
  if (radar) {
    radar.style.background = `linear-gradient(90deg,transparent 0%,${hex} 20%,${hex}dd 50%,${hex} 80%,transparent 100%)`;
    radar.style.filter = `drop-shadow(0 0 8px ${hex})`;
  }
  if (glow) glow.style.background = `linear-gradient(180deg,${hex}28 0%,transparent 100%)`;
}

async function _startFaceCam() {

  _hideFaceHint();
  const sizeBar = document.getElementById('face-size-bar-wrap');
  if (sizeBar) sizeBar.style.display = 'none';
  if (faceRafHandle) { cancelAnimationFrame(faceRafHandle); faceRafHandle = null; }
  if (faceStream) { faceStream.getTracks().forEach(t => t.stop()); faceStream = null; }
  try {
    let stream;
    try {
      stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: 'user', width: { ideal: 480 }, height: { ideal: 360 } }, audio: false
      });
    } catch {
      stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: false });
    }
    faceStream = stream;
    const v = document.getElementById('face-vid');
    v.srcObject = stream;
    await v.play();
    setFaceRing('blue');
    const ok = await loadFaceModels();
    if (!ok) { setFaceStatus('error', '❌ โหลดโมเดล AI ไม่สำเร็จ กรุณาลองใหม่'); return; }
    // Pre-build matcher for checkin/checkout (not needed for register)
    if (faceMatcherDirty && (faceModalMode === 'checkin' || faceModalMode === 'checkout')) {
      _rebuildFaceMatcher();
    }
    setFaceStatus('info', 'จ่อใบหน้าให้อยู่ในกรอบ...');
    faceDetecting = true;
    faceRafHandle = requestAnimationFrame(_faceDetectLoop);
  } catch(e) {
    if (e.name === 'NotAllowedError') {
      setFaceStatus('error', '❌ กรุณาอนุญาตการเข้าถึงกล้องในเบราว์เซอร์');
    } else if (e.name === 'NotFoundError') {
      setFaceStatus('error', '❌ ไม่พบกล้องในอุปกรณ์นี้');
    } else {
      setFaceStatus('error', '❌ เปิดกล้องไม่ได้: ' + e.message);
    }
  }
}

// ============================================================
//  FACE SECURITY CONSTANTS  (ปรับค่าได้ตามสภาพแวดล้อม)
// ============================================================
const FACE_MATCH_THRESHOLD   = 0.46;  // สมดุล: สแกนง่าย แต่คนอื่นแทนยาก
const FACE_CONFIRM_FRAMES    = 2;     // ต้องผ่าน 2 เฟรมติดกัน — ป้องกัน false positive
const FACE_CONFIRM_DIST_MAX  = 0.44;  // แต่ละเฟรมต้องมั่นใจพอ
const FACE_SCORE_MIN         = 0.45;  // กล้องธรรมดาผ่านได้ แต่ต้องเห็นหน้าชัด
const FACE_REG_SAMPLES       = 15;    // เก็บตัวอย่างเยอะไว้เพื่อความแม่นยำ
const FACE_REG_SCORE_MIN     = 0.45;
const FACE_SIZE_MIN          = 0.05;  // ต้องเห็นหน้าพอสมควร
const FACE_SIZE_MAX          = 0.95;
const FACE_LIVENESS_FRAMES   = 3;     // ต้องผ่าน 3 เฟรมก่อน — ป้องกันรูปภาพนิ่ง

// ---- Anti-spoof constants ----
const SPOOF_MOTION_FRAMES    = 6;     // ตรวจ motion ใน 6 เฟรม
const SPOOF_MOTION_THRESH    = 0.003; // ต้องขยับเล็กน้อย — รูปนิ่งไม่ผ่าน
const SPOOF_BLUR_THRESH      = 60;    // กล้องธรรมดาผ่าน แต่รูปบนจอโทรศัพท์ไม่ผ่าน

let _faceConfirmBuf  = [];
let _faceFrameCount  = 0;            // นับเฟรมทั้งหมดตั้งแต่เปิดกล้อง (liveness)
let _faceRegBuf      = [];           // buffer เฟรม registration
let _faceRegSampling = false;
// 3-step registration
let _regStep         = 0;            // 0=front, 1=left, 2=right
let _regStepDescs    = [];           // [frontMean, leftMean, rightMean]
const REG_STEP_FRAMES = 3;           // 3 frames per step — สมดุลระหว่างความเร็วและคุณภาพ

// ---- Anti-spoof tracking ----
let _faceMotionBuf   = [];           // เก็บ descriptor ล่าสุดสำหรับ motion check
let _spoofWarnings   = 0;            // นับครั้งที่ตรวจพบการทุจริต
let _spoofLocked     = false;        // ล็อกเมื่อตรวจพบซ้ำหลายครั้ง

// ---- UI helpers ----
function _showFaceHint(icon, text, color) {
  const banner = document.getElementById('face-hint-banner');
  const iconEl = document.getElementById('face-hint-icon');
  const textEl = document.getElementById('face-hint-text');
  if (!banner) return;
  banner.style.display = 'flex';
  if (iconEl) { iconEl.className = 'fas ' + icon; iconEl.style.color = color || '#fbbf24'; }
  if (textEl) { textEl.textContent = text; textEl.style.color = color === '#ef4444' ? '#fecaca' : '#fef3c7'; }
}
function _hideFaceHint() {
  const b = document.getElementById('face-hint-banner');
  if (b) b.style.display = 'none';
}
function _updateFaceSizeBar(faceW, faceH) {
  const wrap = document.getElementById('face-size-bar-wrap');
  const fill = document.getElementById('face-size-fill');
  const pctEl = document.getElementById('face-size-pct');
  if (!wrap) return;
  const size = Math.max(faceW, faceH);
  const pct = Math.min(100, Math.round(size * 100 * 1.5)); // scale for visual
  wrap.style.display = 'block';
  if (fill) fill.style.width = pct + '%';
  let label, color;
  if (size < FACE_SIZE_MIN)       { label = 'เข้าใกล้อีก'; color = '#f59e0b'; }
  else if (size > FACE_SIZE_MAX)  { label = 'ถอยออกอีก'; color = '#f87171'; }
  else                            { label = 'ระยะพอดี ✓'; color = '#22d3ee'; }
  if (pctEl) { pctEl.textContent = label; pctEl.style.color = color; }
}
function _showSpoofOverlay(msg) {
  const el = document.getElementById('face-spoof-overlay');
  const msgEl = document.getElementById('face-spoof-msg');
  if (!el) return;
  el.style.display = 'flex';
  if (msgEl) msgEl.textContent = msg;
  setTimeout(() => { if (el) el.style.display = 'none'; }, 2500);
}

// ---- Compute blur score (Laplacian variance on grayscale) ----
function _computeBlurScore(canvas) {
  try {
    const ctx = canvas.getContext('2d');
    const { width: w, height: h } = canvas;
    const img = ctx.getImageData(0, 0, w, h).data;
    // Convert to grayscale and compute variance of Laplacian (3×3)
    const gray = new Float32Array(w * h);
    for (let i = 0; i < w * h; i++) gray[i] = 0.299 * img[i*4] + 0.587 * img[i*4+1] + 0.114 * img[i*4+2];
    let sum = 0, sum2 = 0, n = 0;
    for (let y = 1; y < h-1; y++) {
      for (let x = 1; x < w-1; x++) {
        const lap = -gray[(y-1)*w+x] - gray[(y+1)*w+x] - gray[y*w+(x-1)] - gray[y*w+(x+1)] + 4*gray[y*w+x];
        sum += lap; sum2 += lap * lap; n++;
      }
    }
    const mean = sum / n;
    return sum2/n - mean*mean; // variance
  } catch { return 999; }
}

// ---- Check descriptor motion (anti-static photo) ----
function _checkDescriptorMotion(desc) {
  if (_faceMotionBuf.length < 2) { _faceMotionBuf.push(desc); return true; }
  // Compute distance between last 2 descriptors
  const prev = _faceMotionBuf[_faceMotionBuf.length - 1];
  let dist = 0;
  for (let i = 0; i < 128; i++) dist += Math.pow(desc[i] - prev[i], 2);
  dist = Math.sqrt(dist);
  _faceMotionBuf.push(desc);
  if (_faceMotionBuf.length > SPOOF_MOTION_FRAMES) _faceMotionBuf.shift();
  return dist > SPOOF_MOTION_THRESH; // true = มี motion (ปกติ)
}

// ============================================================
//  FAST DETECTION LOOP  (ใช้ requestAnimationFrame)
// ============================================================
async function _faceDetectLoop() {
  if (!faceDetecting) return;
  const v = document.getElementById('face-vid');
  if (!v || v.readyState < v.HAVE_ENOUGH_DATA) {
    faceRafHandle = requestAnimationFrame(_faceDetectLoop); return;
  }

  _faceFrameCount++;

  // Draw to canvas (320×240 — balance speed vs accuracy)
  const canvas = document.createElement('canvas');
  canvas.width = 320; canvas.height = 240;
  canvas.getContext('2d').drawImage(v, 0, 0, 320, 240);

  const opts = new faceapi.TinyFaceDetectorOptions({
    inputSize: 224,
    scoreThreshold: FACE_SCORE_MIN
  });

  let det;
  try {
    det = await faceapi.detectSingleFace(canvas, opts).withFaceLandmarks(true).withFaceDescriptor();
  } catch {
    if (faceDetecting) faceRafHandle = requestAnimationFrame(_faceDetectLoop);
    return;
  }
  if (!faceDetecting) return;

  // ---- No face detected ----
  if (!det) {
    _faceConfirmBuf = []; _faceRegBuf = []; _faceRegSampling = false;
    setFaceRing('blue');
    _hideFaceHint();
    const sizeBar = document.getElementById('face-size-bar-wrap');
    if (sizeBar) sizeBar.style.display = 'none';
    setFaceStatus('info', '🔍 กำลังหาใบหน้า...');
    await new Promise(r => setTimeout(r, 150));
    if (faceDetecting) faceRafHandle = requestAnimationFrame(_faceDetectLoop);
    return;
  }

  // ---- Soft guidance hints (never block) ----
  const faceW = det.detection.box.width  / canvas.width;
  const faceH = det.detection.box.height / canvas.height;
  _updateFaceSizeBar(faceW, faceH);
  const faceCX = (det.detection.box.x + det.detection.box.width / 2) / canvas.width;
  if (faceW < FACE_SIZE_MIN || faceH < FACE_SIZE_MIN) {
    _showFaceHint('fa-arrow-down', '⬇ ขยับเข้าใกล้กล้องอีก', '#fbbf24');
  } else if (faceW > FACE_SIZE_MAX || faceH > FACE_SIZE_MAX) {
    _showFaceHint('fa-arrow-up', '⬆ ถอยหลังออกอีก', '#fbbf24');
  } else if (faceCX < 0.25) {
    _showFaceHint('fa-arrow-right', '➡ หันใบหน้ามาทางขวา', '#60a5fa');
  } else if (faceCX > 0.75) {
    _showFaceHint('fa-arrow-left', '⬅ หันใบหน้ามาทางซ้าย', '#60a5fa');
  } else {
    _hideFaceHint();
  }

  const descriptor = Array.from(det.descriptor);

  // ============================================================
  //  ANTI-SPOOF CHECKS  (blur + motion)
  // ============================================================
  if (_spoofLocked) {
    setFaceRing('red');
    setFaceStatus('error', '🚫 ตรวจพบการทุจริต — ติดต่อ HR เพื่อปลดล็อก');
    await new Promise(r => setTimeout(r, 600));
    if (faceDetecting) faceRafHandle = requestAnimationFrame(_faceDetectLoop);
    return;
  }

  // Blur check — ภาพเบลอมักเกิดจากโทรศัพท์อีกเครื่องหรือวิดีโอคอล
  const blurScore = _computeBlurScore(canvas);
  if (blurScore < SPOOF_BLUR_THRESH && _faceFrameCount > FACE_LIVENESS_FRAMES) {
    _spoofWarnings++;
    if (_spoofWarnings >= 10) {
      _spoofLocked = true;
      faceDetecting = false;
      _showSpoofOverlay('🚫 ตรวจพบการใช้รูปภาพ/วิดีโอ\nไม่อนุญาตให้เช็คชื่อ');
      setFaceStatus('error', '🚫 ตรวจพบการทุจริต — ระบบบล็อกการเช็คชื่อ<br><span style="font-size:11px;">กรุณาติดต่อ HR</span>');
      setFaceRing('red');
      return;
    }
    setFaceRing('red');
    setFaceStatus('warn', `⚠️ ภาพไม่ชัด — ห้ามใช้รูปภาพหรือวิดีโอคอล (${_spoofWarnings}/10)`);
    await new Promise(r => setTimeout(r, 500));
    if (faceDetecting) faceRafHandle = requestAnimationFrame(_faceDetectLoop);
    return;
  }

  // Motion check — รูปนิ่ง/กระดาษจะไม่มี descriptor motion
  const hasMotion = _checkDescriptorMotion(descriptor);
  if (_faceFrameCount > SPOOF_MOTION_FRAMES + 2 && !hasMotion) {
    _spoofWarnings++;
    if (_spoofWarnings >= 10) {
      _spoofLocked = true;
      faceDetecting = false;
      _showSpoofOverlay('🚫 ตรวจพบการใช้รูปภาพนิ่ง\nไม่อนุญาตให้เช็คชื่อ');
      setFaceStatus('error', '🚫 ตรวจพบการทุจริต — ระบบบล็อกการเช็คชื่อ<br><span style="font-size:11px;">กรุณาติดต่อ HR</span>');
      setFaceRing('red');
      return;
    }
    setFaceRing('yellow');
    setFaceStatus('warn', `⚠️ กรุณาขยับใบหน้าเล็กน้อย (${_spoofWarnings}/10)`);
    await new Promise(r => setTimeout(r, 400));
    if (faceDetecting) faceRafHandle = requestAnimationFrame(_faceDetectLoop);
    return;
  }

  // Motion detected — reset spoof warnings gradually
  if (hasMotion && _spoofWarnings > 0) _spoofWarnings = Math.max(0, _spoofWarnings - 1);
  // ============================================================
  if (faceModalMode === 'register' || faceModalMode === 'emp-register') {
    // ============================================================
    //  3-STEP REGISTRATION: Front → Left → Right (REG_STEP_FRAMES each)
    // ============================================================
    const stepLabels = [
      { icon:'😐', th:'หน้าตรง', en:'ขั้น 1/3 — มองตรงหน้ากล้อง', color:'#3b82f6' },
      { icon:'◀', th:'หันซ้าย', en:'ขั้น 2/3 — หันหน้าไปทางซ้ายเล็กน้อย', color:'#8b5cf6' },
      { icon:'▶', th:'หันขวา',  en:'ขั้น 3/3 — หันหน้าไปทางขวาเล็กน้อย', color:'#10b981' },
    ];
    const curStep = stepLabels[_regStep] || stepLabels[0];

    if (!_faceRegSampling) {
      _faceRegSampling = true;
      _faceRegBuf = [];
    }

    _faceRegBuf.push(descriptor);
    const pct = Math.round((_faceRegBuf.length / REG_STEP_FRAMES) * 100);
    setFaceRing(_faceRegBuf.length >= REG_STEP_FRAMES ? 'green' : 'blue');
    setFaceStatus('info',
      `<span style="font-size:22px;">${curStep.icon}</span>
       <div style="font-size:13px;font-weight:700;color:${curStep.color};margin:4px 0 2px;">${curStep.en}</div>
       <div style="background:#1e293b;border-radius:8px;height:10px;margin:8px 0 4px;overflow:hidden;">
         <div style="background:${curStep.color};height:100%;width:${pct}%;transition:width .2s;border-radius:8px;"></div>
       </div>
       <span style="font-size:11px;color:#94a3b8;">${_faceRegBuf.length}/${REG_STEP_FRAMES} เฟรม</span>`);

    if (_faceRegBuf.length < REG_STEP_FRAMES) {
      await new Promise(r => setTimeout(r, 80));
      if (faceDetecting) faceRafHandle = requestAnimationFrame(_faceDetectLoop);
      return;
    }

    // Step done — compute mean descriptor for this step
    const stepMean = _computeMeanDescriptor(_faceRegBuf);
    _regStepDescs.push(stepMean);
    _faceRegBuf = [];
    _faceRegSampling = false;
    _faceFrameCount = 0; // reset liveness for next step

    if (_regStep < 2) {
      // Next step
      _regStep++;
      setFaceRing('green');
      const nextStep = stepLabels[_regStep];
      setFaceStatus('success',
        `✅ ${stepLabels[_regStep-1].th} — บันทึกแล้ว!<br>
         <span style="font-size:13px;color:${nextStep.color};font-weight:700;">→ ต่อไป: ${nextStep.th} ${nextStep.icon}</span>`);
      await new Promise(r => setTimeout(r, 800));
      if (faceDetecting) faceRafHandle = requestAnimationFrame(_faceDetectLoop);
      return;
    }

    // All 3 steps done — compute final combined descriptor = average of 3 step means
    faceDetecting = false;
    const finalDesc = _computeMeanDescriptor(_regStepDescs); // 1 combined descriptor
    _regStepDescs = [];
    _regStep = 0;
    await _handleFaceRegisterMulti([finalDesc]);
    return;
  }

  // ============================================================
  //  CHECKIN / CHECKOUT MODE  — multi-frame confirm
  // ============================================================

  // Liveness gate: reject first N frames (ป้องกันรูปนิ่ง)
  if (_faceFrameCount < FACE_LIVENESS_FRAMES) {
    setFaceRing('blue');
    setFaceStatus('info', `🎥 กำลังเริ่มสแกน... (${_faceFrameCount}/${FACE_LIVENESS_FRAMES})`);
    if (faceDetecting) faceRafHandle = requestAnimationFrame(_faceDetectLoop);
    return;
  }

  const matched = _matchFace(descriptor);

  if (!matched) {
    _faceConfirmBuf = [];
    setFaceRing('red');
    const hasAny = db.employees.some(e => (e.faceDescriptors?.length > 0) || e.faceDescriptor);
    setFaceStatus('error',
      hasAny
        ? `❌ ไม่รู้จักใบหน้านี้<br><span style="font-size:11px;">กรุณาลงทะเบียนใบหน้าก่อน หรือขอให้ HR ลงทะเบียนให้</span>`
        : `❌ ยังไม่มีพนักงานลงทะเบียนใบหน้าในระบบ`);
    await new Promise(r => setTimeout(r, 600));
    if (faceDetecting) faceRafHandle = requestAnimationFrame(_faceDetectLoop);
    return;
  }

  // Accumulate frames — must be same person AND strict distance every frame
  const last = _faceConfirmBuf[_faceConfirmBuf.length - 1];
  if (!last || last.label !== matched.emp._key || matched.dist > FACE_CONFIRM_DIST_MAX) {
    _faceConfirmBuf = [];
  }
  if (matched.dist <= FACE_CONFIRM_DIST_MAX) {
    _faceConfirmBuf.push({ label: matched.emp._key, dist: matched.dist });
  }

  const confirmed   = _faceConfirmBuf.length >= FACE_CONFIRM_FRAMES;
  const pct         = Math.round((_faceConfirmBuf.length / FACE_CONFIRM_FRAMES) * 100);
  const confidence  = Math.max(0, Math.round((1 - matched.dist / FACE_MATCH_THRESHOLD) * 100));

  if (!confirmed) {
    setFaceRing('blue');
    setFaceStatus('info',
      `👤 พบ: <strong>${matched.emp.name}</strong><br>
       <div style="background:#dcfce7;border-radius:6px;height:8px;margin:8px 0 4px;overflow:hidden;">
         <div style="background:#16a34a;height:100%;width:${pct}%;transition:width .15s;border-radius:6px;"></div>
       </div>
       <span style="font-size:11px;color:#15803d;">ยืนยัน ${_faceConfirmBuf.length}/${FACE_CONFIRM_FRAMES} เฟรม · ความมั่นใจ ${confidence}%</span>`);
    await new Promise(r => setTimeout(r, 100));
    if (faceDetecting) faceRafHandle = requestAnimationFrame(_faceDetectLoop);
    return;
  }

  // ✅ Confirmed — average the confirmed descriptors for final match
  setFaceRing('green');
  const avgDesc = _computeMeanDescriptor(_faceConfirmBuf.map(() => descriptor)); // last descriptor (all same person)
  _faceConfirmBuf = [];
  faceDetecting = false;

  if (faceModalMode === 'checkin')  await _handleFaceCheckin(avgDesc);
  else if (faceModalMode === 'checkout') await _handleFaceCheckout(avgDesc);
}

// ---- Compute mean descriptor from multiple samples ----
function _computeMeanDescriptor(samples) {
  const len = 128;
  const mean = new Array(len).fill(0);
  for (const s of samples) {
    for (let i = 0; i < len; i++) mean[i] += s[i];
  }
  for (let i = 0; i < len; i++) mean[i] /= samples.length;
  return mean;
}

// ---- Register Multi: save multiple angle descriptors (new method) ----
async function _handleFaceRegisterMulti(descriptors) {
  faceDetecting = false;
  setFaceStatus('info', '📸 เก็บตัวอย่างครบแล้ว! กำลังบันทึก...');
  const overlay = document.getElementById('face-scan-overlay');
  if (overlay) { overlay.style.display = 'flex'; setTimeout(() => { if(overlay) overlay.style.display = 'none'; }, 1200); }

  const empKey = faceRegEmpKey;
  const emp    = db.employees.find(e => e._key === empKey);
  if (!emp) { setFaceStatus('error', '❌ ไม่พบข้อมูลพนักงาน'); return; }

  const isEmpSelf = (faceModalMode === 'emp-register');
  const newCount  = (emp.faceRegCount || 0) + 1;
  const willLock  = isEmpSelf && newCount >= FACE_REG_MAX;

  // Merge with existing descriptors, keep up to 9 (3 registrations × 3 angles)
  const existing  = emp.faceDescriptors || (emp.faceDescriptor ? [emp.faceDescriptor] : []);
  const allDescs  = [...existing.filter(d => Array.isArray(d) && d.length === 128), ...descriptors];
  const keepDescs = allDescs.slice(-9); // keep at most 9 descriptors

  const updatePayload = {
    faceDescriptors: keepDescs,
    faceDescriptor:  descriptors[0], // keep legacy single for compat
    faceRegCount:    newCount,
    ...(isEmpSelf && willLock ? { faceRegLocked: true } : {})
  };

  try {
    showSync();
    await fbPatch('/employees/' + empKey, updatePayload);
    const idx = db.employees.findIndex(e => e._key === empKey);
    if (idx >= 0) {
      db.employees[idx].faceDescriptors = keepDescs;
      db.employees[idx].faceDescriptor  = descriptors[0];
      db.employees[idx].faceRegCount    = newCount;
      if (willLock) db.employees[idx].faceRegLocked = true;
    }
    faceMatcherDirty = true;
    hideSync();
    const msg = willLock
      ? `✅ บันทึกสำเร็จ (ครั้งที่ ${newCount}/${FACE_REG_MAX}) · เก็บ ${keepDescs.length} มุม\n🔒 ถูกล็อค — ติดต่อ HR เพื่อรีเซ็ต`
      : `✅ บันทึกใบหน้าสำเร็จ ครั้งที่ ${newCount}/${FACE_REG_MAX}\nเก็บ ${keepDescs.length} ตัวอย่าง (${descriptors.length} มุมใหม่)`;
    setFaceStatus('success', msg);
    setTimeout(() => {
      stopFaceCam();
      if (isEmpSelf) pgEmpFaceReg();
    }, 2000);
  } catch(e) {
    hideSync();
    setFaceStatus('error', '❌ บันทึกไม่สำเร็จ: ' + e.message);
    setTimeout(() => { faceDetecting = true; faceRafHandle = requestAnimationFrame(_faceDetectLoop); }, 2000);
  }
}

// ---- Register (legacy single descriptor — admin path) ----
async function _handleFaceRegister(descriptor) {
  return _handleFaceRegisterMulti([descriptor]);
}


// ---- Check-in: match and record ----
async function _handleFaceCheckin(descriptor) {
  faceDetecting = false;
  setFaceStatus('info', '🔍 กำลังค้นหาใบหน้าในระบบ...');
  const matched = _matchFace(descriptor);
  if (!matched) {
    setFaceRing('red');
    setFaceStatus('error', '❌ ไม่พบใบหน้าในระบบ — กรุณาลงทะเบียนก่อน');

// ---- Helper: find best face match ----
// ---- GPS: check against ANY registered location ----

// Promise-based GPS check — returns {available, ok, dist, loc}
// ============================================================
//  GPS ANTI-FAKE DETECTION SYSTEM
//  ตรวจจับ Mock/Fake GPS ด้วย 3 วิธีพร้อมกัน:
//  1. Accuracy Anomaly  — Fake GPS มักให้ accuracy ต่ำผิดปกติ (1-3m)
//  2. Multi-Sample Variance — GPS จริงมี noise ต่ำ, Fake GPS บางตัวกระโดด
//  3. Speed Plausibility — ถ้า location กระโดดไกลเกินไปจากครั้งที่แล้ว
// ============================================================
const GPS_ACCURACY_SUSPICIOUS  = 4;    // ≤ 4m = น่าสงสัย (GPS จริงในอาคารมักได้ 10-50m)
const GPS_ACCURACY_BLOCK       = 2;    // ≤ 2m = บล็อกทันที (แทบเป็นไปไม่ได้ในการใช้งานจริง)
const GPS_SAMPLES              = 3;    // จำนวนครั้งที่ดึง GPS เพื่อเปรียบเทียบ
const GPS_SAMPLE_INTERVAL      = 800;  // ms ระหว่างแต่ละ sample
const GPS_VARIANCE_LIMIT       = 0.00005; // ≈ 5m — Fake GPS มักได้ค่าตรงเป๊ะทุกครั้ง
const GPS_MAX_SPEED_MPS        = 5;    // 5 m/s ≈ เดินเร็ว/วิ่ง — ถ้าเร็วกว่านี้ = teleport

// เก็บตำแหน่ง GPS สุดท้ายของแต่ละ device เพื่อตรวจ speed
const _gpsHistory = {};  // { deviceId: { lat, lng, ts } }

function _sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

async function _getSingleGps(opts = {}) {
  return new Promise((resolve, reject) => {
    navigator.geolocation.getCurrentPosition(resolve, reject, {
      enableHighAccuracy: true,
      timeout: 10000,
      maximumAge: 0,
      ...opts
    });
  });
}

async function _getGpsResult() {
  if (!navigator.geolocation) {
    return { available: false, ok: false, dist: 9999, loc: '', fakeFlags: [] };
  }
  if (!gpsLocations.length && !hrGPS.lat) {
    return { available: true, ok: true, dist: 0, loc: 'ไม่ได้กำหนดพื้นที่', fakeFlags: [] };
  }

  // ---- เก็บ GPS หลายครั้งเพื่อวิเคราะห์ ----
  const samples = [];
  try {
    for (let i = 0; i < GPS_SAMPLES; i++) {
      const pos = await _getSingleGps();
      samples.push({
        lat: pos.coords.latitude,
        lng: pos.coords.longitude,
        acc: pos.coords.accuracy,
        ts:  pos.timestamp || Date.now()
      });
      if (i < GPS_SAMPLES - 1) await _sleep(GPS_SAMPLE_INTERVAL);
    }
  } catch {
    return { available: false, ok: false, dist: 9999, loc: '', fakeFlags: [] };
  }

  const lat = samples[samples.length - 1].lat;
  const lng = samples[samples.length - 1].lng;
  const acc = samples[samples.length - 1].acc;
  const fakeFlags = [];

  // ============================================================
  //  CHECK 1: Accuracy Anomaly
  //  GPS จริง: อาคาร 15-50m | กลางแจ้ง 5-15m
  //  Fake GPS: มักให้ 1-3m เสมอ
  // ============================================================
  const minAcc = Math.min(...samples.map(s => s.acc));
  if (minAcc <= GPS_ACCURACY_BLOCK) {
    fakeFlags.push({ code: 'ACC_EXTREME', msg: `ความแม่นยำ GPS สูงผิดปกติมาก (${minAcc.toFixed(1)}m) — ระบบปลอม GPS` });
  } else if (minAcc <= GPS_ACCURACY_SUSPICIOUS) {
    fakeFlags.push({ code: 'ACC_HIGH', msg: `ความแม่นยำ GPS สูงผิดปกติ (${minAcc.toFixed(1)}m)` });
  }

  // ============================================================
  //  CHECK 2: Multi-Sample Variance
  //  GPS จริงมี noise ตามธรรมชาติ
  //  Fake GPS บางแอปให้ค่าตรงกันเป๊ะทุก sample
  // ============================================================
  if (samples.length >= 2) {
    const latVars = samples.map(s => s.lat);
    const lngVars = samples.map(s => s.lng);
    const latRange = Math.max(...latVars) - Math.min(...latVars);
    const lngRange = Math.max(...lngVars) - Math.min(...lngVars);
    const totalVariance = latRange + lngRange;
    if (totalVariance === 0) {
      fakeFlags.push({ code: 'ZERO_VARIANCE', msg: 'ตำแหน่ง GPS ซ้ำกันทุก sample — อาจเป็น Mock GPS' });
    } else if (totalVariance < GPS_VARIANCE_LIMIT / 10) {
      fakeFlags.push({ code: 'LOW_VARIANCE', msg: 'ตำแหน่ง GPS คงที่ผิดธรรมชาติ' });
    }
  }

  // ============================================================
  //  CHECK 3: Speed Plausibility (Teleport Detection)
  //  ถ้าเคยเช็ค GPS ไว้ก่อนหน้า แล้ว location กระโดดไกลเกิน
  // ============================================================
  const did = getDeviceId();
  const prev = _gpsHistory[did];
  if (prev) {
    const distFromPrev = distM(prev.lat, prev.lng, lat, lng);
    const timeDiff = (Date.now() - prev.ts) / 1000; // seconds
    if (timeDiff > 0 && timeDiff < 3600) { // only check within 1 hour
      const speed = distFromPrev / timeDiff; // m/s
      if (speed > GPS_MAX_SPEED_MPS && distFromPrev > 50) {
        fakeFlags.push({
          code: 'TELEPORT',
          msg: `ตำแหน่งเปลี่ยนเร็วผิดปกติ ${Math.round(speed)} m/s (${Math.round(distFromPrev)}m ใน ${Math.round(timeDiff)}s)`
        });
      }
    }
  }

  // บันทึก GPS ปัจจุบัน
  _gpsHistory[did] = { lat, lng, ts: Date.now() };

  // ---- ผลการตรวจสอบพื้นที่ ----
  const g = gpsInAny(lat, lng);
  const isFakeSuspected = fakeFlags.length > 0;
  // บล็อกทันทีถ้ามี flag รุนแรง
  const isHardBlock = fakeFlags.some(f => f.code === 'ACC_EXTREME' || f.code === 'ZERO_VARIANCE' || f.code === 'TELEPORT');

  return {
    available:    true,
    ok:           g.ok && !isHardBlock,
    dist:         g.dist,
    loc:          g.loc,
    accuracy:     acc,
    fakeFlags,
    isFakeSuspected,
    isHardBlock,
    rawLat:       lat,
    rawLng:       lng,
  };
}

function gpsInAny(lat, lng) {
  if (!gpsLocations.length) {
    // fallback to legacy single location
    const d = distM(hrGPS.lat, hrGPS.lng, lat, lng);
    return { ok: d <= (hrGPS.radius||100), dist: d, loc: hrGPS.name||'สถานที่หลัก' };
  }
  let bestDist = Infinity, bestLoc = null;
  for (const loc of gpsLocations) {
    const d = distM(loc.lat, loc.lng, lat, lng);
    if (d < bestDist) { bestDist = d; bestLoc = loc; }
  }
  return { ok: bestDist <= (bestLoc.radius||100), dist: Math.round(bestDist), loc: bestLoc?.name||'' };
}

// ---- Rebuild FaceMatcher from all registered employees ----
function _rebuildFaceMatcher() {
  const withFace = db.employees.filter(e => {
    const descs = e.faceDescriptors || (e.faceDescriptor ? [e.faceDescriptor] : []);
    return descs.some(d => Array.isArray(d) && d.length === 128);
  });
  if (!withFace.length) { faceMatcher = null; faceMatcherDirty = false; return; }

  const labeled = withFace.map(emp => {
    const descs = (emp.faceDescriptors || [emp.faceDescriptor])
      .filter(d => Array.isArray(d) && d.length === 128)
      .map(d => new Float32Array(d));
    return new faceapi.LabeledFaceDescriptors(emp._key, descs);
  });
  faceMatcher = new faceapi.FaceMatcher(labeled, FACE_MATCH_THRESHOLD);
  faceMatcherDirty = false;
}

// ---- Match face — double verification ----
function _matchFace(descriptor) {
  if (faceMatcherDirty || !faceMatcher) _rebuildFaceMatcher();
  if (!faceMatcher) return null;

  const query  = new Float32Array(descriptor);
  const result = faceMatcher.findBestMatch(query);

  // Primary: FaceMatcher reject
  if (!result || result.label === 'unknown' || result.distance > FACE_MATCH_THRESHOLD) return null;

  const emp = db.employees.find(e => e._key === result.label);
  if (!emp) return null;

  // Secondary: manual minimum distance against ALL stored descriptors
  const descs = (emp.faceDescriptors || [emp.faceDescriptor])
    .filter(d => Array.isArray(d) && d.length === 128);
  if (!descs.length) return null;
  const minDist = Math.min(...descs.map(d => faceapi.euclideanDistance(new Float32Array(d), query)));

  // Verify no OTHER employee is close enough to be ambiguous
  const allEmpsWithFace = db.employees.filter(e => e._key !== emp._key && (e.faceDescriptors?.length > 0 || e.faceDescriptor));
  for (const other of allEmpsWithFace) {
    const otherDescs = (other.faceDescriptors || [other.faceDescriptor])
      .filter(d => Array.isArray(d) && d.length === 128);
    const otherMin = Math.min(...otherDescs.map(d => faceapi.euclideanDistance(new Float32Array(d), query)));
    // Reject if another person is within 0.08 of best match (ambiguous identity)
    if (otherMin < minDist + 0.08 && otherMin <= FACE_MATCH_THRESHOLD) return null;
  }

  if (minDist > FACE_MATCH_THRESHOLD) return null;
  return { emp, dist: minDist };
}

};

window.adminSaveAttendance = async function(dateKey, fbKey, empId, otRate) {
  const inT  = document.getElementById('ea-in').value;
  const outT = document.getElementById('ea-out').value;
  const ot   = parseFloat(document.getElementById('ea-ot').value) || 0;
  const wage = parseInt(document.getElementById('ea-wage').value) || 0;
  const note = document.getElementById('ea-note').value.trim();
  if (!inT) return alert('กรุณากรอกเวลาเข้างาน');
  const otPay  = Math.round(ot * otRate);
  const total  = wage + otPay;
  const patch = {
    checkInTime: inT, otHours: ot, wage, otPay, total,
    adminNote: note, adminEditBy: CU.displayName, adminEditAt: Date.now(),
    ...(outT ? { checkOutTime: outT } : {}),
    ...(!outT && { checkOutTime: null })
  };
  // Remove null if outT is empty
  if (!outT) { delete patch.checkOutTime; patch.checkOutTime = ''; }
  showSync();
  await fbPatch(`/attendance/${dateKey}/${fbKey}`, patch);
  if (db.attendance[dateKey] && db.attendance[dateKey][fbKey]) {
    Object.assign(db.attendance[dateKey][fbKey], patch);
  }
  hideSync();
  closeModal();
  renderDashBody(dateKey);
  alert(`✅ บันทึกสำเร็จ\nเวลาเข้า: ${inT} · เวลาออก: ${outT||'—'} · รวม: ฿${total.toLocaleString()}`);
};

window.adminClearCheckout = async function(dateKey, fbKey, name) {
  if (!confirm(`ยกเลิกเวลาออกของ ${name}?\nพนักงานจะต้องสแกนออกใหม่`)) return;
  showSync();
  await fbPatch(`/attendance/${dateKey}/${fbKey}`, { checkOutTime: '', checkOutGps: null, checkOutDist: null });
  if (db.attendance[dateKey]?.[fbKey]) {
    db.attendance[dateKey][fbKey].checkOutTime = '';
    db.attendance[dateKey][fbKey].checkOutGps  = null;
  }
  hideSync();
  closeModal();
  renderDashBody(dateKey);
};

window.adminDeleteAttendance = async function(dateKey, fbKey, name) {
  if (!confirm(`⚠️ ลบบันทึกการเข้างานของ ${name} วันนี้ออกทั้งหมด?\nไม่สามารถกู้คืนได้`)) return;
  showSync();
  await fbDelete(`/attendance/${dateKey}/${fbKey}`);
  if (db.attendance[dateKey]) delete db.attendance[dateKey][fbKey];
  hideSync();
  closeModal();
  renderDashBody(dateKey);
};

window.adminDoCheckInFor = async function(dateKey) {
  const empKey = document.getElementById('aci-emp').value;
  const inT    = document.getElementById('aci-in').value;
  const outT   = document.getElementById('aci-out').value;
  const ot     = parseFloat(document.getElementById('aci-ot').value) || 0;

  if (!inT)    return alert('กรุณากรอกเวลาเข้างาน');
  const emp = db.employees.find(e=>e._key===empKey); if(!emp) return;
  const wage   = emp.wage || db.wage.defaultWage;
  const otPay  = Math.round(ot * (db.wage.otRate||75));
  const rec = {
    empId: emp._key, empName: emp.name, dept: emp.dept, sup: emp.sup, supId: emp.supId||'',
    checkInTime: inT, otHours: ot, wage, otPay, total: wage+otPay,
    gpsOk: true, distMeters: 0, timestamp: Date.now(),
    checkInMethod: 'admin', adminEditBy: CU.displayName,
    ...(outT ? { checkOutTime: outT, checkOutGps: true } : {})
  };
  showSync();
  const res = await fbPush(`/attendance/${dateKey}`, rec);
  if (!db.attendance[dateKey]) db.attendance[dateKey] = {};
  db.attendance[dateKey][res.name] = rec;
  hideSync();
  closeModal();
  renderDashBody(dateKey);
  alert(`✅ เช็คชื่อให้ ${emp.name} สำเร็จ · เวลาเข้า ${inT}${outT?' · ออก '+outT:''}`);
};

window.exportSupExcel = function(supKey, month) {
  const s = Object.assign({}, ...db.supervisors.filter(x=>x._key===supKey));
  const thMonth = getMonths().find(m=>m.v===month)?.l||month;
  const wb = XLSX.utils.book_new();

  // Build per-employee data
  const empData={};
  const dateRecs=[];
  Object.entries(db.attendance).forEach(([dk,bucket])=>{
    if(!dk.startsWith(month))return;
    Object.values(bucket||{}).forEach(r=>{
      if(r.supId!==supKey)return;
      if(!empData[r.empId]) empData[r.empId]={empId:r.empId,empName:r.empName,dept:r.dept,days:0,tWage:0,tOt:0,tTotal:0};
      empData[r.empId].days++; empData[r.empId].tWage+=r.wage; empData[r.empId].tOt+=r.otPay; empData[r.empId].tTotal+=r.total;
      dateRecs.push({dk,r});
    });
  });
  const rows=Object.values(empData).sort((a,b)=>b.tTotal-a.tTotal);
  const tD=rows.reduce((s,r)=>s+r.days,0), tW=rows.reduce((s,r)=>s+r.tWage,0), tO=rows.reduce((s,r)=>s+r.tOt,0), tA=rows.reduce((s,r)=>s+r.tTotal,0);

  // Sheet 1: Summary per employee
  const s1=[
    [`สรุปการทำงาน — ทีม ${s.name||''} — ${thMonth}`],[],
    ['พนักงาน','สายงาน','วันทำงาน','ค่าแรงปกติ (฿)','ค่า OT (฿)','รวม (฿)'],
    ...rows.map(r=>[r.empName,r.dept,r.days,r.tWage,r.tOt,r.tTotal]),
    [],['รวมทีม','',tD,tW,tO,tA]
  ];
  const ws1=XLSX.utils.aoa_to_sheet(s1);
  ws1['!cols']=[{wch:24},{wch:16},{wch:10},{wch:14},{wch:12},{wch:14}];
  XLSX.utils.book_append_sheet(wb,ws1,'สรุปรายบุคคล');

  // Sheet 2: Daily detail
  const s2=[
    [`รายละเอียดรายวัน — ทีม ${s.name||''} — ${thMonth}`],[],
    ['วันที่','พนักงาน','สายงาน','เวลาเข้า','เวลาออก','OT','ค่าแรง (฿)','ค่า OT (฿)','รวม (฿)','GPS']
  ];
  dateRecs.sort((a,b)=>a.dk.localeCompare(b.dk)).forEach(({dk,r})=>{
    s2.push([fmtThai(dk),r.empName,r.dept,r.checkInTime||'',r.checkOutTime||'-',r.otHours||0,r.wage,r.otPay,r.total,r.gpsOk?'ตรงจุด':'นอกพื้นที่']);
  });
  const ws2=XLSX.utils.aoa_to_sheet(s2);
  ws2['!cols']=[{wch:16},{wch:24},{wch:16},{wch:10},{wch:10},{wch:8},{wch:12},{wch:12},{wch:12},{wch:12}];
  XLSX.utils.book_append_sheet(wb,ws2,'รายละเอียดรายวัน');

  XLSX.writeFile(wb,`supervisor_${s.name||supKey}_${month}.xlsx`);
};

// =====================================================================
//  DEVICE BINDING — UNIVERSAL CHECK (ใช้กับทุกโหมดการเช็คชื่อ)
// =====================================================================
// Returns: { ok: bool, msg: string }
// - ถ้ายังไม่ผูก → ผูกอัตโนมัติครั้งแรก → ok:true
// - ถ้าผูกแล้วตรง → ok:true
// - ถ้าผูกแล้วไม่ตรง → ok:false
async function _enforceDeviceBinding(empId, empName) {
  const did = getDeviceId();
  const b = deviceBindings[empId];

  // ============================================================
  //  ตรวจสอบว่า Device นี้ถูกผูกกับคนอื่นอยู่แล้วหรือไม่
  //  ครอบคลุมทั้งพนักงานและหัวหน้างาน
  // ============================================================
  const allPeople = [
    ...db.employees.map(e => ({ id: e._key, name: e.name, role: 'พนักงาน' })),
    ...db.supervisors.map(s => ({ id: s._key, name: s.name, role: 'หัวหน้างาน' }))
  ];
  // หาว่า device นี้ผูกกับใครอยู่ (ที่ไม่ใช่ตัวเอง)
  const conflictPerson = allPeople.find(p => {
    if (p.id === empId) return false; // ตัวเองไม่นับ
    const pb = deviceBindings[p.id];
    return pb && pb.deviceId === did;
  });

  if (conflictPerson) {
    // Device นี้ถูกผูกกับคนอื่นอยู่ — บล็อก + บันทึก fraud alert
    await fbPush('/fraudAlerts', {
      type: 'DEVICE_CONFLICT',
      empId, empName,
      conflictId: conflictPerson.id,
      conflictName: conflictPerson.name,
      conflictRole: conflictPerson.role,
      deviceId: did,
      timestamp: Date.now(),
      dateStr: todayStr
    }).catch(() => {});
    return {
      ok: false,
      msg: `🚫 อุปกรณ์นี้ถูกผูกกับบัญชี "${conflictPerson.name}" (${conflictPerson.role}) อยู่แล้ว\nไม่อนุญาตให้ใช้เครื่องเดียวกันหลายบัญชี\n\nกรุณาติดต่อ Admin`
    };
  }

  if (!b || !b.deviceId) {
    // ครั้งแรก — ผูกอุปกรณ์นี้
    const payload = { deviceId: did, boundAt: new Date().toISOString(), empName };
    try {
      await fbSet('/deviceBindings/' + empId, payload);
      deviceBindings[empId] = payload;
      return { ok: true, msg: '✅ ผูกอุปกรณ์นี้แล้ว' };
    } catch(e) {
      return { ok: false, msg: '❌ ผูกอุปกรณ์ไม่สำเร็จ: ' + e.message };
    }
  }
  if (b.deviceId === did) {
    return { ok: true, msg: '✅ อุปกรณ์ถูกต้อง' };
  }
  return {
    ok: false,
    msg: '🚫 อุปกรณ์นี้ไม่ใช่อุปกรณ์ที่ลงทะเบียนไว้\nกรุณาใช้อุปกรณ์เดิม หรือติดต่อ HR เพื่อรีเซ็ต'
  };
}

window.saveAreaMethod = async function(locId) {
  const val = document.querySelector(`input[name="am-${locId}"]:checked`)?.value;
  if (!val) return;
  areaCheckinMethods[locId] = val;
  showSync();
  await fbSet('/settings/areaCheckinMethods/' + locId, val);
  hideSync();
  const loc = gpsLocations.find(l => l.id === locId);
  const label = {qr:'QR Code', face:'สแกนใบหน้า', both:'QR + ใบหน้า', gps_button:'กดปุ่ม + GPS'};
  const btn = event?.target || document.activeElement;
  if (btn) { const orig = btn.innerHTML; btn.innerHTML = '<i class="fas fa-check"></i> บันทึกแล้ว!'; btn.style.background='#16a34a'; setTimeout(()=>{ btn.innerHTML=orig; btn.style.background='#f59e0b'; },1800); }
};

async function pgFraudAlerts() {
  const mc = document.getElementById('main-content');
  mc.innerHTML = `<div class="flex justify-between items-center mb-5">
    <h3 class="text-base font-bold text-gray-700 border-l-4 border-orange-500 pl-3">

    </h3>
    <button onclick="pgFraudAlerts()" class="text-sm text-gray-500 hover:text-gray-700">
      <i class="fas fa-sync mr-1"></i>รีเฟรช
    </button>
  </div>
  <div id="fraud-wrap"><div class="flex justify-center py-10"><div class="loading-spinner" style="width:32px;height:32px;border-width:3px;"></div></div></div>`;

  const raw = await fbGet('/fraudAlerts');
  const alerts = raw ? Object.entries(raw).map(([k,v]) => ({_key:k,...v})) : [];
  alerts.sort((a,b) => b.timestamp - a.timestamp);

  const el = document.getElementById('fraud-wrap');
  if (!el) return;

  if (!alerts.length) {
    el.innerHTML = `<div class="text-center py-12 text-gray-400">
      <i class="fas fa-check-circle text-4xl text-green-400 mb-3 block"></i>
      ไม่พบรายการทุจริต
    </div>`;
    return;
  }

  const flagLabels = {
    ACC_EXTREME:    { label:'ความแม่นยำ GPS สูงผิดปกติมาก', color:'bg-red-100 text-red-700' },
    ACC_HIGH:       { label:'ความแม่นยำ GPS สูงผิดปกติ',    color:'bg-orange-100 text-orange-700' },
    ZERO_VARIANCE:  { label:'ตำแหน่งไม่ขยับเลย (Mock)',      color:'bg-red-100 text-red-700' },
    LOW_VARIANCE:   { label:'ตำแหน่งคงที่ผิดธรรมชาติ',      color:'bg-orange-100 text-orange-700' },
    TELEPORT:       { label:'ตำแหน่งกระโดดไกลผิดปกติ',      color:'bg-red-100 text-red-700' },
    DEVICE_CONFLICT:{ label:'ใช้เครื่องเดียวกันหลายบัญชี', color:'bg-purple-100 text-purple-700' },
  };

  el.innerHTML = `
    <div style="background:#fff3cd;border:1px solid #ffc107;border-radius:12px;padding:14px 18px;margin-bottom:16px;font-size:13px;color:#856404;">
      <i class="fas fa-info-circle mr-2"></i>
      พบ <strong>${alerts.length}</strong> รายการที่น่าสงสัย — กรุณาตรวจสอบและดำเนินการ
    </div>
    <div class="overflow-x-auto">
    <table class="min-w-full text-sm">
      ${THead('วันที่/เวลา','พนักงาน','ประเภทการทุจริต','ความแม่นยำ GPS','ตำแหน่ง','จัดการ')}
      <tbody>
        ${alerts.map(a => {
          const dt = new Date(a.timestamp);
          const dtStr = dt.toLocaleDateString('th-TH',{day:'numeric',month:'short'}) + ' ' + dt.toLocaleTimeString('th-TH',{hour:'2-digit',minute:'2-digit'});
          // รองรับทั้ง FAKE_GPS (flags array) และ DEVICE_CONFLICT
          let flags = '';
          if (a.type === 'DEVICE_CONFLICT') {
            flags = `<span class="inline-block px-2 py-0.5 rounded text-xs font-medium bg-purple-100 text-purple-700 mr-1 mb-1"><i class="fas fa-mobile-alt mr-1"></i>ใช้เครื่องเดียวกันหลายบัญชี</span>
              ${a.conflictName?`<span class="inline-block px-2 py-0.5 rounded text-xs font-medium bg-gray-100 text-gray-600 mr-1 mb-1">กับ: ${a.conflictName} (${a.conflictRole||''})</span>`:''}`;
          } else {
            flags = (a.flags||[]).map(f => {
              const info = flagLabels[f] || {label:f, color:'bg-gray-100 text-gray-700'};
              return `<span class="inline-block px-2 py-0.5 rounded text-xs font-medium ${info.color} mr-1 mb-1">${info.label}</span>`;
            }).join('');
          }
          const mapsUrl = a.rawLat ? `https://maps.google.com/?q=${a.rawLat},${a.rawLng}` : null;
          return `<tr class="hover:bg-gray-50 border-b">
            <td class="px-4 py-3 text-xs text-gray-500 whitespace-nowrap">${dtStr}</td>
            <td class="px-4 py-3 font-medium">${a.empName||'-'}<br><span class="text-xs text-gray-400">${a.empId||''}</span></td>
            <td class="px-4 py-3">${flags||'-'}</td>
            <td class="px-4 py-3 text-center">
              ${a.accuracy != null ? `<span class="font-mono text-xs ${a.accuracy<=2?'text-red-600 font-bold':a.accuracy<=4?'text-orange-600':'text-gray-500'}">${a.accuracy.toFixed(1)}m</span>` : '-'}
            </td>
            <td class="px-4 py-3 text-xs">
              ${mapsUrl ? `<a href="${mapsUrl}" target="_blank" class="text-blue-500 hover:underline"><i class="fas fa-map-marker-alt mr-1"></i>ดูแผนที่</a>` : '-'}
            </td>
            <td class="px-4 py-3">
              <button onclick="deleteFraudAlert('${a._key}')" class="text-red-400 text-xs hover:underline">ลบ</button>
            </td>
          </tr>`;
        }).join('')}
      </tbody>
    </table>
    </div>
    <div class="mt-4 flex gap-3">
      <button onclick="clearAllFraudAlerts()" class="bg-red-50 text-red-600 border border-red-200 px-4 py-2 rounded-lg text-sm hover:bg-red-100">
        <i class="fas fa-trash mr-2"></i>ล้างทั้งหมด
      </button>
    </div>`;
}

window.deleteFraudAlert = async function(key) {
  showSync();
  await fbDelete('/fraudAlerts/' + key);
  hideSync();
  pgFraudAlerts();
};

window.clearAllFraudAlerts = async function() {
  if (!confirm('ล้างรายการแจ้งเตือนทั้งหมด?')) return;
  showSync();
  await fbDelete('/fraudAlerts');
  hideSync();
  pgFraudAlerts();
};

// Filter by clicking stat card: all | bound | unbound | sup
window.filterDbCards = function(mode) {
  const labels = {
    all:     'แสดงทั้งหมด',
    bound:   'ผูก Device แล้ว',
    unbound: 'ยังไม่ผูก Device',
    sup:     'หัวหน้างาน'
  };
  const colors = {
    all:'#3b82f6', bound:'#16a34a', unbound:'#92400e', sup:'#7c3aed'
  };

  // Update label
  const lbl = document.getElementById('db-filter-label');
  if (lbl) { lbl.textContent = '⚙ ' + (labels[mode]||'ทั้งหมด'); lbl.style.color = colors[mode]||'#3b82f6'; }

  // Highlight active card
  ['all','bound','unbound','sup'].forEach(m => {
    const card = document.getElementById('dbc-'+m);
    if (!card) return;
    card.style.border = m === mode ? `2px solid ${colors[m]}` : '2px solid transparent';
    card.style.boxShadow = m === mode ? `0 0 0 3px ${colors[m]}33` : '';
  });

  // Filter rows
  document.querySelectorAll('.db-row').forEach(r => {
    const isBound = r.dataset.bound === 'true';
    const isSup   = r.dataset.type === 'sup';
    let show = true;
    if (mode === 'bound')   show = isBound;
    if (mode === 'unbound') show = !isBound;
    if (mode === 'sup')     show = isSup;
    r.style.display = show ? '' : 'none';
  });
};

window.resetDeviceBinding = async function(key, type='emp') {
  const list = type === 'sup' ? db.supervisors : db.employees;
  const person = list.find(x => x._key === key);
  const role = type === 'sup' ? 'หัวหน้างาน' : 'พนักงาน';
  if (!confirm(`รีเซ็ต Device Binding ของ ${role} "${person?.name||key}"?\n\nจะสามารถเช็คชื่อจากอุปกรณ์ใหม่ได้ครั้งแรกอีกครั้ง`)) return;
  showSync();
  await fbDelete('/deviceBindings/' + key);
  delete deviceBindings[key];
  hideSync();
  pgDeviceBindings();
};

window.forceBindDevice = async function(key, type='emp') {
  const list = type === 'sup' ? db.supervisors : db.employees;
  const person = list.find(x => x._key === key);
  const role = type === 'sup' ? 'หัวหน้างาน' : 'พนักงาน';
  const did = getDeviceId();
  if (!confirm(`ผูกอุปกรณ์ปัจจุบัน (Admin) กับ${role} "${person?.name||key}"?\n\nDevice ID: ${did.slice(0,30)}...\n\n(ควรทำจากอุปกรณ์ของ${role}จริงๆ)`)) return;
  showSync();
  const payload = { deviceId: did, boundAt: new Date().toISOString(), empName: person?.name||key, boundBy: 'admin' };
  await fbSet('/deviceBindings/' + key, payload);
  deviceBindings[key] = payload;
  hideSync();
  pgDeviceBindings();
};

window.doChgPwdModal = async function() {
  const n = document.getElementById('cpwd-new')?.value?.trim();
  const cf = document.getElementById('cpwd-cfm')?.value?.trim();
  const errEl = document.getElementById('cpwd-err');
  const showErr = (msg) => { if(errEl){ errEl.textContent=msg; errEl.classList.remove('hidden'); } };
  if (!n || !cf) { showErr('กรุณากรอกรหัสผ่านใหม่ให้ครบ'); return; }
  if (n !== cf) { showErr('รหัสผ่านใหม่ไม่ตรงกัน'); return; }

  closeModal();
  alert('✅ เปลี่ยนรหัสผ่านสำเร็จ!\nรหัสผ่านใหม่: ' + n);
};

window.myHist = async function(month) {
  const e = db.employees.find(x => x._key === CU.id); if (!e) return;
  await loadAttendanceMonth(month);
  const recs = [];
  Object.entries(db.attendance).forEach(([k, bucket]) => {
    if (!k.startsWith(month)) return;
    const r = Object.values(bucket || {}).find(r => r.empId === e._key);
    if (r) recs.push({...r, dk: k});
  });
  recs.sort((a, b) => a.dk.localeCompare(b.dk));

  const tD = recs.length;
  const tW = recs.reduce((s,r)=>s+r.wage,0);
  const tO = recs.reduce((s,r)=>s+r.otPay,0);
  const tA = recs.reduce((s,r)=>s+r.total,0);

  const el = document.getElementById('my-hist'); if (!el) return;

  // Build calendar
  const [yr, mo] = month.split('-').map(Number);
  const firstDay = new Date(yr, mo-1, 1).getDay(); // 0=Sun
  const daysInMonth = new Date(yr, mo, 0).getDate();
  const todayDate = new Date();
  const isThisMonth = (todayDate.getFullYear()===yr && todayDate.getMonth()+1===mo);

  const workedDays = new Set(recs.map(r => parseInt(r.dk.split('-')[2])));

  const dayNames = ['อา','จ','อ','พ','พฤ','ศ','ส'];
  let calCells = '';
  // Day headers
  dayNames.forEach((d, i) => {
    calCells += `<div style="text-align:center;font-size:11px;font-weight:700;color:${i===0||i===6?'#ef4444':'#64748b'};padding:6px 0;">${d}</div>`;
  });
  // Empty prefix cells
  for (let i = 0; i < firstDay; i++) {
    calCells += `<div></div>`;
  }
  // Day cells
  for (let d = 1; d <= daysInMonth; d++) {
    const dow = (firstDay + d - 1) % 7;
    const isWeekend = (dow === 0 || dow === 6);
    const isToday = isThisMonth && d === todayDate.getDate();
    const worked = workedDays.has(d);
    const dk = `${month}-${String(d).padStart(2,'0')}`;
    const rec = recs.find(r => r.dk === dk);

    let cellBg = 'transparent';
    let dayColor = isWeekend ? '#ef4444' : '#1e293b';
    let dotHtml = '';

    if (isToday) {
      cellBg = '#3b82f6';
      dayColor = '#fff';
    }
    if (worked) {
      dotHtml = `<div style="width:6px;height:6px;background:${isToday?'#bbf7d0':'#16a34a'};border-radius:50%;margin:0 auto;margin-top:2px;"></div>`;
    }

    const clickable = worked && rec;
    const clickAttr = clickable
      ? `onclick="showEmpDayDetail(${JSON.stringify({dk:rec.dk,checkInTime:rec.checkInTime,checkOutTime:rec.checkOutTime||'',dept:rec.dept,gpsOk:rec.gpsOk,wage:rec.wage,otPay:rec.otPay,total:rec.total,checkInMethod:rec.checkInMethod||'QR'}).replace(/\"/g,'&quot;')});event.stopPropagation();" style="cursor:pointer;"`
      : 'style="cursor:default;"';

    calCells += `<div ${clickAttr}>
      <div style="width:32px;height:32px;border-radius:50%;background:${cellBg};display:flex;align-items:center;justify-content:center;margin:0 auto;font-size:13px;font-weight:${isToday?'700':'500'};color:${dayColor};">${d}</div>
      ${dotHtml}
    </div>`;
  }

  el.innerHTML = `
    <!-- Stat cards -->
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px;">
      <div style="background:#fff;border-radius:14px;padding:14px 16px;box-shadow:0 1px 6px rgba(0,0,0,.06);border-left:3px solid #16a34a;">
        <div style="font-size:22px;font-weight:700;color:#16a34a;">${tD}</div>
        <div style="font-size:11px;color:#64748b;margin-top:2px;"><i class="fas fa-calendar-check" style="margin-right:4px;"></i>วันทำงาน</div>
      </div>
      <div style="background:#fff;border-radius:14px;padding:14px 16px;box-shadow:0 1px 6px rgba(0,0,0,.06);border-left:3px solid #3b82f6;">
        <div style="font-size:18px;font-weight:700;color:#1d4ed8;">฿${tW.toLocaleString()}</div>
        <div style="font-size:11px;color:#64748b;margin-top:2px;"><i class="fas fa-coins" style="margin-right:4px;"></i>ค่าแรงปกติ</div>
      </div>
      <div style="background:#fff;border-radius:14px;padding:14px 16px;box-shadow:0 1px 6px rgba(0,0,0,.06);border-left:3px solid #f59e0b;">
        <div style="font-size:18px;font-weight:700;color:#d97706;">฿${tO.toLocaleString()}</div>
        <div style="font-size:11px;color:#64748b;margin-top:2px;"><i class="fas fa-clock" style="margin-right:4px;"></i>ค่า OT</div>
      </div>
      <div style="background:linear-gradient(135deg,#1e3a5f,#1d4ed8);border-radius:14px;padding:14px 16px;box-shadow:0 1px 6px rgba(0,0,0,.1);">
        <div style="font-size:18px;font-weight:700;color:#fff;">฿${tA.toLocaleString()}</div>

      </div>
    </div>

    <!-- Calendar -->
    <div style="background:#fff;border-radius:16px;box-shadow:0 1px 6px rgba(0,0,0,.07);padding:16px;margin-bottom:16px;">
      <div style="font-weight:700;font-size:13px;color:#1e293b;margin-bottom:12px;display:flex;align-items:center;gap:8px;">
        <i class="fas fa-calendar-alt" style="color:#3b82f6;"></i>
        ${new Date(yr, mo-1, 1).toLocaleDateString('th-TH',{month:'long',year:'numeric'})}
        <span style="font-size:11px;background:#dcfce7;color:#15803d;padding:2px 8px;border-radius:10px;font-weight:600;margin-left:auto;">${tD} วัน</span>

      <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:2px;">

        <div style="display:flex;align-items:center;gap:4px;color:#ef4444;">อา/ส = วันหยุด</div>
      </div>
    </div>

    <!-- Recent records list -->
    ${recs.length ? `
    <div style="background:#fff;border-radius:16px;box-shadow:0 1px 6px rgba(0,0,0,.07);overflow:hidden;">
      <div style="padding:14px 18px;border-bottom:1px solid #f1f5f9;display:flex;justify-content:space-between;align-items:center;">

        <span style="font-size:11px;color:#64748b;">${tD} รายการ</span>
      </div>
      ${[...recs].reverse().map((r,i) => `
        <div onclick="showEmpDayDetail(${JSON.stringify({dk:r.dk,checkInTime:r.checkInTime,checkOutTime:r.checkOutTime||'',dept:r.dept,gpsOk:r.gpsOk,wage:r.wage,otPay:r.otPay,total:r.total,checkInMethod:r.checkInMethod||'QR'}).replace(/\"/g,'&quot;')})"
          style="padding:12px 18px;border-bottom:${i<recs.length-1?'1px solid #f8fafc':'none'};cursor:pointer;display:flex;justify-content:space-between;align-items:center;transition:background .15s;"
          onmouseover="this.style.background='#f8fafc'" onmouseout="this.style.background='transparent'">
          <div>
            <div style="font-size:13px;font-weight:600;color:#1e293b;">${fmtThai(r.dk)}${r.dk===todayStr?'<span style="background:#dbeafe;color:#1e40af;font-size:10px;padding:1px 6px;border-radius:8px;margin-left:6px;">วันนี้</span>':''}</div>
            <div style="font-size:11px;color:#64748b;margin-top:2px;display:flex;align-items:center;gap:6px;">
              <span><i class="fas fa-sign-in-alt" style="color:#16a34a;margin-right:2px;font-size:9px;"></i>${r.checkInTime}</span>
              ${r.checkOutTime?`<span><i class="fas fa-sign-out-alt" style="color:#dc2626;margin-right:2px;font-size:9px;"></i>${r.checkOutTime}</span>`:'<span style="color:#f59e0b;font-size:10px;">ยังไม่ได้ออก</span>'}
            </div>
          </div>
          <div style="text-align:right;display:flex;flex-direction:column;align-items:flex-end;gap:4px;">
            <div style="font-weight:700;color:#16a34a;font-size:14px;">฿${r.total.toLocaleString()}</div>
            ${r.gpsOk?'<span style="font-size:10px;background:#dcfce7;color:#166534;padding:1px 6px;border-radius:6px;">✓ GPS</span>':'<span style="font-size:10px;background:#fee2e2;color:#991b1b;padding:1px 6px;border-radius:6px;">✗ GPS</span>'}
          </div>
        </div>`).join('')}
    </div>` : `
    <div style="background:#fff;border-radius:16px;padding:32px;text-align:center;box-shadow:0 1px 6px rgba(0,0,0,.07);">
      <i class="fas fa-calendar-times" style="font-size:36px;color:#cbd5e1;display:block;margin-bottom:12px;"></i>
      <div style="color:#94a3b8;font-size:14px;">ไม่มีข้อมูลเดือนนี้</div>
    </div>`}
  `;
};

// =====================================================================
window.onload=()=>{
  // โหลด remember me จาก localStorage
  try{
    const saved=JSON.parse(localStorage.getItem('2ps_remember')||'null');
    if(saved&&saved.u){
      document.getElementById('login-u').value=saved.u;
      document.getElementById('login-p').value=saved.p||'';
      document.getElementById('remember-me').checked=true;
    }
  }catch(e){}
  initApp();
};
window.saveRemember=function(){
  const chk=document.getElementById('remember-me').checked;
  if(!chk){localStorage.removeItem('2ps_remember');return;}
  const u=document.getElementById('login-u').value;
  const p=document.getElementById('login-p').value;
  if(u)localStorage.setItem('2ps_remember',JSON.stringify({u,p}));
};
</script>
</body>
</html>
